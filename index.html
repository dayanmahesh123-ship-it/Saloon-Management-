// POS Tab - Point of Sale (Complete Component)
// ═══════════════════════════════════════════════════════════════

function POSTab() {
  const { addToast } = useToast();
  const { isDark } = useTheme();
  const [products, setProducts] = useState([]);
  const [staff, setStaff] = useState([]);
  const [cart, setCart] = useState([]);
  const [search, setSearch] = useState('');
  const [catFilter, setCatFilter] = useState('සියලුම');
  const [customerName, setCustomerName] = useState('');
  const [customerPhone, setCustomerPhone] = useState('');
  const [payMethod, setPayMethod] = useState('cash');
  const [discount, setDiscount] = useState('');
  const [discountType, setDiscountType] = useState('amount'); // amount or percent
  const [selectedStaff, setSelectedStaff] = useState('');
  const [showReceipt, setShowReceipt] = useState(false);
  const [lastTxn, setLastTxn] = useState(null);
  const [processing, setProcessing] = useState(false);
  const [loading, setLoading] = useState(true);
  const [showQuickAdd, setShowQuickAdd] = useState(false);
  const searchRef = useRef(null);

  useEffect(() => { loadData(); }, []);

  // Keyboard shortcut - focus search on /
  useEffect(() => {
    const handler = (e) => {
      if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
        e.preventDefault();
        searchRef.current?.focus();
      }
      if (e.key === 'F2') {
        e.preventDefault();
        handleCheckout();
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [cart]);

  const loadData = async () => {
    setLoading(true);
    const [prodData, staffData] = await Promise.all([DB.getProducts(), DB.getStaff()]);
    setProducts(prodData);
    setStaff(staffData.filter(s => s.status === 'active'));
    setLoading(false);
  };

  const filteredProducts = useMemo(() => {
    return products.filter(p => {
      const matchSearch = !search ||
        p.name.toLowerCase().includes(search.toLowerCase()) ||
        (p.nameEn && p.nameEn.toLowerCase().includes(search.toLowerCase())) ||
        (p.barcode && p.barcode.includes(search));
      const matchCat = catFilter === 'සියලුම' || p.category === catFilter;
      return matchSearch && matchCat && p.stock > 0;
    });
  }, [products, search, catFilter]);

  const addToCart = useCallback((product) => {
    setCart(prev => {
      const existing = prev.find(c => c.productId === product.id);
      if (existing) {
        if (existing.qty >= product.stock) {
          addToast('තොග ප්‍රමාණය ප්‍රමාණවත් නැත ⚠️', 'warning');
          return prev;
        }
        return prev.map(c => c.productId === product.id ? { ...c, qty: c.qty + 1 } : c);
      }
      return [...prev, {
        productId: product.id, name: product.name, price: product.price,
        qty: 1, image: product.image, maxStock: product.stock
      }];
    });
  }, [addToast]);

  const updateQty = useCallback((productId, newQty) => {
    if (newQty <= 0) {
      setCart(prev => prev.filter(c => c.productId !== productId));
      return;
    }
    const prod = products.find(p => p.id === productId);
    if (prod && newQty > prod.stock) {
      addToast('තොග ප්‍රමාණය ප්‍රමාණවත් නැත', 'warning');
      return;
    }
    setCart(prev => prev.map(c => c.productId === productId ? { ...c, qty: newQty } : c));
  }, [products, addToast]);

  const updateItemPrice = useCallback((productId, newPrice) => {
    setCart(prev => prev.map(c => c.productId === productId ? { ...c, price: parseFloat(newPrice) || 0 } : c));
  }, []);

  const removeFromCart = useCallback((productId) => {
    setCart(prev => prev.filter(c => c.productId !== productId));
  }, []);

  const clearCart = useCallback(() => {
    if (cart.length === 0) return;
    if (!confirm('කරත්තය හිස් කරන්නද?')) return;
    setCart([]);
    setCustomerName('');
    setCustomerPhone('');
    setDiscount('');
    setSelectedStaff('');
  }, [cart]);

  // ── Calculations ──
  const subtotal = useMemo(() => cart.reduce((s, c) => s + (c.price * c.qty), 0), [cart]);
  const discountAmt = useMemo(() => {
    const val = parseFloat(discount) || 0;
    if (discountType === 'percent') return Math.min(subtotal * (val / 100), subtotal);
    return Math.min(val, subtotal);
  }, [discount, discountType, subtotal]);
  const total = useMemo(() => Math.max(0, subtotal - discountAmt), [subtotal, discountAmt]);
  const itemCount = useMemo(() => cart.reduce((s, c) => s + c.qty, 0), [cart]);

  // ── Checkout ──
  const handleCheckout = async () => {
    if (cart.length === 0) {
      addToast('කරත්තයට අයිතම එකතු කරන්න 🛒', 'warning');
      return;
    }
    setProcessing(true);
    try {
      const staffMember = staff.find(s => s.id === selectedStaff);
      const txn = await DB.saveTransaction({
        items: cart,
        subtotal,
        discount: discountAmt,
        total,
        payMethod,
        customerName: customerName || 'පාරිභෝගිකයා',
        customerPhone,
        staffId: selectedStaff,
        staffName: staffMember?.name || ''
      });

      setLastTxn(txn);
      setShowReceipt(true);
      setCart([]);
      setCustomerName('');
      setCustomerPhone('');
      setDiscount('');
      setSelectedStaff('');
      setPayMethod('cash');
      loadData();
      fireConfetti();
      addToast(`ගනුදෙනුව සාර්ථකයි! ${formatCurrency(total)} 🎉`, 'success');
    } catch (e) {
      addToast('ගනුදෙනුවේ දෝෂයක් ❌', 'error');
    }
    setProcessing(false);
  };

  const sendReceiptWhatsApp = () => {
    if (!lastTxn) return;
    const phone = lastTxn.customerPhone || customerPhone;
    if (!phone) {
      addToast('දුරකථන අංකය ඇතුළත් කරන්න', 'warning');
      return;
    }
    const text = generateReceiptText(lastTxn, products);
    sendWhatsApp(phone, text);
  };

  // ── Quick Service Add ──
  const addServiceToCart = (service) => {
    const pseudoProduct = {
      id: service.id,
      name: service.name,
      price: service.price,
      stock: 999,
      image: service.icon
    };
    addToCart(pseudoProduct);
    setShowQuickAdd(false);
  };

  if (loading) return <Skeleton rows={4} />;

  return (
    <div className="flex flex-col lg:flex-row gap-4 page-enter" style={{ minHeight: 'calc(100vh - 180px)' }}>

      {/* ═══════════════════════════════════════
          LEFT SIDE - PRODUCTS PANEL
          ═══════════════════════════════════════ */}
      <div className="flex-1 flex flex-col min-w-0">

        {/* Search & Filter Bar */}
        <div className="flex flex-col sm:flex-row gap-2 mb-3">
          <div className="relative flex-1">
            <i className="fas fa-search absolute left-3.5 top-1/2 -translate-y-1/2 text-sm" style={{ color: 'var(--text-tertiary)' }}></i>
            <input ref={searchRef} type="text" placeholder='නිෂ්පාදන සොයන්න... (/ ඔබන්න)'
              value={search} onChange={e => setSearch(e.target.value)}
              className="w-full pl-10 pr-10 py-2.5 rounded-xl text-sm themed-input" />
            {search && (
              <button onClick={() => setSearch('')}
                className="absolute right-3 top-1/2 -translate-y-1/2 w-5 h-5 rounded-full flex items-center justify-center"
                style={{ backgroundColor: 'var(--bg-tertiary)' }}>
                <i className="fas fa-times text-[10px]" style={{ color: 'var(--text-tertiary)' }}></i>
              </button>
            )}
          </div>
          <div className="flex gap-2">
            <select value={catFilter} onChange={e => setCatFilter(e.target.value)}
              className="px-3 py-2.5 rounded-xl text-sm themed-input flex-1 sm:flex-none">
              {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
            </select>
            <button onClick={() => setShowQuickAdd(true)}
              className="px-3 py-2.5 rounded-xl text-sm font-medium flex items-center gap-1.5 transition-all"
              style={{ backgroundColor: 'var(--bg-tertiary)', color: 'var(--text-secondary)' }}
              title="සේවා එකතු කරන්න">
              <i className="fas fa-concierge-bell"></i>
              <span className="hidden sm:inline">සේවා</span>
            </button>
          </div>
        </div>

        {/* Products Grid */}
        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-3 xl:grid-cols-4 gap-2 sm:gap-3 overflow-y-auto scrollbar-thin flex-1 pb-4 pr-1"
          style={{ maxHeight: 'calc(100vh - 280px)' }}>
          {filteredProducts.map((p, i) => {
            const inCart = cart.find(c => c.productId === p.id);
            return (
              <button key={p.id} onClick={() => addToCart(p)}
                className={`pos-item rounded-xl sm:rounded-2xl p-2.5 sm:p-3 border text-left relative group transition-all
                  ${inCart ? 'ring-2 ring-pink-400 shadow-md' : ''}`}
                style={{
                  backgroundColor: 'var(--bg-card)',
                  borderColor: inCart ? '#ec4899' : 'var(--border-primary)',
                  animationDelay: `${Math.min(i * 20, 200)}ms`
                }}>

                {/* Product content */}
                <div className="text-center mb-1.5 sm:mb-2 relative">
                  <span className="text-2xl sm:text-3xl transition-transform group-hover:scale-110 inline-block">{p.image}</span>
                  {/* Sparkle on hover */}
                  <span className="absolute -top-1 -right-1 text-xs opacity-0 group-hover:opacity-100 transition-all">✨</span>
                </div>

                <h4 className="text-[11px] sm:text-xs font-medium truncate mb-0.5" style={{ color: 'var(--text-primary)' }}>
                  {p.name}
                </h4>

                <div className="flex items-center justify-between">
                  <span className="text-xs sm:text-sm font-extrabold text-pink-600">
                    {formatCurrencyShort(p.price)}
                  </span>
                  <span className={`text-[9px] sm:text-[10px] px-1.5 py-0.5 rounded-full font-medium
                    ${p.stock <= p.minStock && p.minStock > 0 ? 'bg-red-100 text-red-600' : 'text-gray-400'}`}
                    style={p.stock > p.minStock || p.minStock === 0 ? { backgroundColor: 'var(--bg-tertiary)', color: 'var(--text-tertiary)' } : {}}>
                    {p.stock}
                  </span>
                </div>

                {/* Cart quantity badge */}
                {inCart && (
                  <div className="absolute -top-2 -right-2 w-6 h-6 sm:w-7 sm:h-7 bg-gradient-to-br from-pink-500 to-rose-500 text-white rounded-full text-[10px] sm:text-xs flex items-center justify-center font-bold shadow-lg animate-bounceIn">
                    {inCart.qty}
                  </div>
                )}

                {/* Low stock warning */}
                {p.stock <= p.minStock && p.minStock > 0 && (
                  <div className="absolute top-1 left-1">
                    <span className="w-2 h-2 bg-red-500 rounded-full block animate-pulse"></span>
                  </div>
                )}
              </button>
            );
          })}
        </div>

        {filteredProducts.length === 0 && (
          <div className="text-center py-12" style={{ color: 'var(--text-tertiary)' }}>
            <span className="text-4xl block mb-3">🔍</span>
            <p className="text-sm font-medium">නිෂ්පාදන හමු නොවීය</p>
            <p className="text-xs mt-1">වෙනත් වචනයකින් සොයන්න</p>
          </div>
        )}
      </div>

      {/* ═══════════════════════════════════════
          RIGHT SIDE - CART PANEL
          ═══════════════════════════════════════ */}
      <div className="w-full lg:w-[380px] xl:w-[400px] flex flex-col rounded-2xl overflow-hidden shadow-lg border"
        style={{ backgroundColor: 'var(--bg-card)', borderColor: 'var(--border-primary)', maxHeight: 'calc(100vh - 140px)' }}>

        {/* Cart Header */}
        <div className="p-4 relative overflow-hidden flex-shrink-0"
          style={{ background: 'linear-gradient(135deg, #ec4899, #a855f7)' }}>
          <div className="absolute inset-0 overflow-hidden pointer-events-none">
            <span className="absolute -top-4 -right-4 text-6xl opacity-10 rotate-12">🛒</span>
          </div>
          <div className="flex items-center justify-between relative z-10">
            <h3 className="font-bold text-lg text-white flex items-center gap-2">
              <i className="fas fa-shopping-bag"></i> කරත්තය
            </h3>
            <div className="flex items-center gap-2">
              <span className="bg-white/20 backdrop-blur-sm px-3 py-1 rounded-full text-sm text-white font-medium">
                {itemCount} අයිතම
              </span>
              {cart.length > 0 && (
                <button onClick={clearCart}
                  className="w-7 h-7 rounded-full bg-white/15 flex items-center justify-center hover:bg-white/25 transition-all text-white/80 hover:text-white"
                  title="කරත්තය හිස් කරන්න">
                  <i className="fas fa-trash-can text-xs"></i>
                </button>
              )}
            </div>
          </div>
        </div>

        {/* Cart Items */}
        <div className="flex-1 overflow-y-auto scrollbar-thin p-3 space-y-2" style={{ minHeight: '120px' }}>
          {cart.length === 0 ? (
            <div className="text-center py-10 animate-fadeIn" style={{ color: 'var(--text-tertiary)' }}>
              <div className="w-16 h-16 rounded-2xl mx-auto mb-3 flex items-center justify-center animate-float"
                style={{ backgroundColor: 'var(--bg-tertiary)' }}>
                <i className="fas fa-bag-shopping text-2xl"></i>
              </div>
              <p className="text-sm font-medium">කරත්තය හිස්ය</p>
              <p className="text-xs mt-1">නිෂ්පාදන ක්ලික් කර එකතු කරන්න</p>
            </div>
          ) : (
            cart.map((item, i) => (
              <div key={item.productId}
                className="flex items-center gap-2.5 p-2.5 rounded-xl border transition-all animate-slideInUp group"
                style={{ backgroundColor: 'var(--bg-tertiary)', borderColor: 'var(--border-primary)', animationDelay: `${i * 40}ms` }}>

                {/* Item emoji */}
                <span className="text-xl sm:text-2xl flex-shrink-0">{item.image}</span>

                {/* Item details */}
                <div className="flex-1 min-w-0">
                  <div className="text-xs sm:text-sm font-medium truncate" style={{ color: 'var(--text-primary)' }}>{item.name}</div>
                  <div className="text-[11px] flex items-center gap-1" style={{ color: 'var(--text-tertiary)' }}>
                    {formatCurrency(item.price)} × {item.qty}
                  </div>
                </div>

                {/* Quantity controls */}
                <div className="flex items-center gap-0.5">
                  <button onClick={() => updateQty(item.productId, item.qty - 1)}
                    className="w-6 h-6 sm:w-7 sm:h-7 rounded-lg flex items-center justify-center transition-all border
                      hover:bg-red-50 hover:border-red-200 hover:text-red-500 active:scale-90"
                    style={{ backgroundColor: 'var(--bg-card)', borderColor: 'var(--border-secondary)', color: 'var(--text-secondary)' }}>
                    <i className="fas fa-minus text-[9px]"></i>
                  </button>
                  <input type="number" value={item.qty} min="1" max={item.maxStock || 999}
                    onChange={e => updateQty(item.productId, parseInt(e.target.value) || 1)}
                    className="w-8 sm:w-9 text-center text-xs sm:text-sm font-bold rounded-lg py-0.5 themed-input border-0"
                    style={{ backgroundColor: 'transparent', color: 'var(--text-primary)' }} />
                  <button onClick={() => updateQty(item.productId, item.qty + 1)}
                    className="w-6 h-6 sm:w-7 sm:h-7 rounded-lg flex items-center justify-center transition-all border
                      hover:bg-green-50 hover:border-green-200 hover:text-green-500 active:scale-90"
                    style={{ backgroundColor: 'var(--bg-card)', borderColor: 'var(--border-secondary)', color: 'var(--text-secondary)' }}>
                    <i className="fas fa-plus text-[9px]"></i>
                  </button>
                </div>

                {/* Item total */}
                <div className="text-right min-w-[65px]">
                  <div className="text-xs sm:text-sm font-bold" style={{ color: 'var(--text-primary)' }}>
                    {formatCurrencyShort(item.price * item.qty)}
                  </div>
                </div>

                {/* Remove button */}
                <button onClick={() => removeFromCart(item.productId)}
                  className="w-5 h-5 rounded-full flex items-center justify-center transition-all
                    opacity-40 hover:opacity-100 hover:bg-red-100 hover:text-red-500 active:scale-90"
                  style={{ color: 'var(--text-tertiary)' }}>
                  <i className="fas fa-xmark text-[10px]"></i>
                </button>
              </div>
            ))
          )}
        </div>

        {/* Cart Footer - Checkout Section */}
        {cart.length > 0 && (
          <div className="border-t p-3 sm:p-4 space-y-3 flex-shrink-0" style={{ borderColor: 'var(--border-primary)' }}>

            {/* Customer Info */}
            <div className="grid grid-cols-2 gap-2">
              <div className="relative">
                <i className="fas fa-user absolute left-2.5 top-1/2 -translate-y-1/2 text-[10px]" style={{ color: 'var(--text-tertiary)' }}></i>
                <input type="text" placeholder="පාරිභෝගික නම"
                  value={customerName} onChange={e => setCustomerName(e.target.value)}
                  className="w-full pl-7 pr-2 py-2 rounded-lg text-xs themed-input" />
              </div>
              <div className="relative">
                <i className="fas fa-phone absolute left-2.5 top-1/2 -translate-y-1/2 text-[10px]" style={{ color: 'var(--text-tertiary)' }}></i>
                <input type="tel" placeholder="077XXXXXXX"
                  value={customerPhone} onChange={e => setCustomerPhone(e.target.value)}
                  className="w-full pl-7 pr-2 py-2 rounded-lg text-xs themed-input" />
              </div>
            </div>

            {/* Staff Selection */}
            <div className="relative">
              <i className="fas fa-user-tie absolute left-2.5 top-1/2 -translate-y-1/2 text-[10px]" style={{ color: 'var(--text-tertiary)' }}></i>
              <select value={selectedStaff} onChange={e => setSelectedStaff(e.target.value)}
                className="w-full pl-7 pr-2 py-2 rounded-lg text-xs themed-input">
                <option value="">සේවකයා තෝරන්න (විකල්ප)</option>
                {staff.map(s => {
                  const role = STAFF_ROLES.find(r => r.id === s.role);
                  return <option key={s.id} value={s.id}>{role?.icon || '👤'} {s.name}</option>;
                })}
              </select>
            </div>

            {/* Payment Methods */}
            <div className="grid grid-cols-4 gap-1.5">
              {PAY_METHODS.map(pm => (
                <button key={pm.id} onClick={() => setPayMethod(pm.id)}
                  className={`py-2 rounded-xl text-[10px] sm:text-xs font-medium transition-all flex flex-col items-center gap-0.5 border-2
                    ${payMethod === pm.id
                      ? 'bg-pink-50 text-pink-700 border-pink-300 shadow-sm'
                      : 'border-transparent hover:border-pink-100'}`}
                  style={payMethod !== pm.id ? { backgroundColor: 'var(--bg-tertiary)', color: 'var(--text-secondary)' } : {}}>
                  <i className={`fas ${pm.icon} text-sm ${payMethod === pm.id ? pm.color : ''}`}></i>
                  <span>{pm.label}</span>
                </button>
              ))}
            </div>

            {/* Discount */}
            <div className="flex gap-1.5">
              <div className="relative flex-1">
                <i className="fas fa-tag absolute left-2.5 top-1/2 -translate-y-1/2 text-[10px]" style={{ color: 'var(--text-tertiary)' }}></i>
                <input type="number" placeholder="වට්ටම"
                  value={discount} onChange={e => setDiscount(e.target.value)}
                  className="w-full pl-7 pr-2 py-2 rounded-lg text-xs themed-input" min="0" />
              </div>
              <div className="flex rounded-lg overflow-hidden border" style={{ borderColor: 'var(--border-input)' }}>
                <button onClick={() => setDiscountType('amount')}
                  className={`px-2.5 py-2 text-[10px] font-medium transition-all
                    ${discountType === 'amount' ? 'bg-pink-500 text-white' : ''}`}
                  style={discountType !== 'amount' ? { backgroundColor: 'var(--bg-input)', color: 'var(--text-secondary)' } : {}}>
                  Rs.
                </button>
                <button onClick={() => setDiscountType('percent')}
                  className={`px-2.5 py-2 text-[10px] font-medium transition-all
                    ${discountType === 'percent' ? 'bg-pink-500 text-white' : ''}`}
                  style={discountType !== 'percent' ? { backgroundColor: 'var(--bg-input)', color: 'var(--text-secondary)' } : {}}>
                  %
                </button>
              </div>
            </div>

            {/* Totals */}
            <div className="rounded-xl p-3 space-y-1.5" style={{ backgroundColor: 'var(--bg-tertiary)' }}>
              <div className="flex justify-between text-xs" style={{ color: 'var(--text-secondary)' }}>
                <span>උප එකතුව ({itemCount} අයිතම)</span>
                <span className="font-medium">{formatCurrency(subtotal)}</span>
              </div>
              {discountAmt > 0 && (
                <div className="flex justify-between text-xs text-red-500 animate-fadeIn">
                  <span className="flex items-center gap-1">
                    <i className="fas fa-tag text-[10px]"></i> වට්ටම
                    {discountType === 'percent' && <span className="text-[10px]">({discount}%)</span>}
                  </span>
                  <span className="font-medium">-{formatCurrency(discountAmt)}</span>
                </div>
              )}
              <div className="flex justify-between items-center pt-2 mt-1 border-t" style={{ borderColor: 'var(--border-secondary)' }}>
                <span className="text-base font-bold" style={{ color: 'var(--text-primary)' }}>මුළු එකතුව</span>
                <span className="text-xl font-extrabold text-pink-600 tracking-tight">{formatCurrency(total)}</span>
              </div>
            </div>

            {/* Checkout Button */}
            <button onClick={handleCheckout} disabled={processing}
              className={`w-full py-3.5 sm:py-4 rounded-xl font-bold text-base sm:text-lg shadow-lg transition-all
                flex items-center justify-center gap-2 relative overflow-hidden
                ${processing
                  ? 'bg-gray-300 cursor-not-allowed text-gray-500'
                  : 'bg-gradient-to-r from-emerald-500 via-green-500 to-teal-500 text-white hover:shadow-xl active:scale-[0.98] animate-pulseGlow'}`}>

              {/* Shimmer effect on button */}
              {!processing && (
                <div className="absolute inset-0 overflow-hidden">
                  <div className="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full animate-[shimmer_3s_infinite]"></div>
                </div>
              )}

              <span className="relative z-10 flex items-center gap-2">
                {processing ? (
                  <><i className="fas fa-spinner animate-spin"></i> සකසමින්...</>
                ) : (
                  <><i className="fas fa-check-circle"></i> ගෙවීම තහවුරු කරන්න (F2)</>
                )}
              </span>
            </button>
          </div>
        )}
      </div>

      {/* ═══════════════════════════════════════
          RECEIPT MODAL
          ═══════════════════════════════════════ */}
      <Modal isOpen={showReceipt} onClose={() => setShowReceipt(false)} title="🧾 රිසිට්පත" size="sm">
        {lastTxn && (
          <div className="space-y-4">
            {/* Success animation */}
            <div className="text-center py-3 animate-bounceIn">
              <div className="w-16 h-16 rounded-full bg-gradient-to-br from-emerald-400 to-green-500 mx-auto flex items-center justify-center shadow-lg mb-3">
                <i className="fas fa-check text-white text-2xl"></i>
              </div>
              <h3 className="text-lg font-bold text-emerald-600">ගනුදෙනුව සාර්ථකයි! 🎉</h3>
            </div>

            {/* Receipt */}
            <div className="rounded-xl p-4 receipt-print border" style={{ backgroundColor: 'var(--bg-tertiary)', borderColor: 'var(--border-primary)' }}>
              {/* Header */}
              <div className="text-center mb-3">
                <div className="text-base font-bold" style={{ color: 'var(--text-primary)' }}>✨ LUMINA SALON & SPA ✨</div>
                <div className="text-[11px]" style={{ color: 'var(--text-tertiary)' }}>කොළඹ, ශ්‍රී ලංකාව | 📞 011-2345678</div>
              </div>

              <div className="border-t border-dashed my-2" style={{ borderColor: 'var(--border-secondary)' }}></div>

              {/* Receipt details */}
              <div className="text-[11px] space-y-0.5" style={{ color: 'var(--text-secondary)' }}>
                <div className="flex justify-between">
                  <span>රිසිට්පත:</span>
                  <span className="font-bold" style={{ color: 'var(--text-primary)' }}>{lastTxn.receiptNo}</span>
                </div>
                <div className="flex justify-between">
                  <span>දිනය:</span>
                  <span>{formatDateTime(lastTxn.date)}</span>
                </div>
                {lastTxn.customerName && lastTxn.customerName !== 'පාරිභෝගිකයා' && (
                  <div className="flex justify-between">
                    <span>පාරිභෝගිකයා:</span>
                    <span>{lastTxn.customerName}</span>
                  </div>
                )}
                {lastTxn.staffName && (
                  <div className="flex justify-between">
                    <span>සේවකයා:</span>
                    <span>{lastTxn.staffName}</span>
                  </div>
                )}
              </div>

              <div className="border-t border-dashed my-2" style={{ borderColor: 'var(--border-secondary)' }}></div>

              {/* Items */}
              <div className="text-[11px] space-y-1.5">
                {lastTxn.items && lastTxn.items.map((item, idx) => (
                  <div key={idx} className="flex justify-between items-start">
                    <div className="flex-1">
                      <span>{item.image} {item.name}</span>
                      <div style={{ color: 'var(--text-tertiary)' }}>
                        &nbsp;&nbsp;{item.qty} × {formatCurrency(item.price)}
                      </div>
                    </div>
                    <span className="font-medium ml-2" style={{ color: 'var(--text-primary)' }}>
                      {formatCurrency(item.qty * item.price)}
                    </span>
                  </div>
                ))}
              </div>

              <div className="border-t border-dashed my-2" style={{ borderColor: 'var(--border-secondary)' }}></div>

              {/* Totals */}
              <div className="text-[11px] space-y-1">
                {lastTxn.discount > 0 && (
                  <>
                    <div className="flex justify-between" style={{ color: 'var(--text-secondary)' }}>
                      <span>උප එකතුව</span>
                      <span>{formatCurrency(lastTxn.subtotal)}</span>
                    </div>
                    <div className="flex justify-between text-red-500">
                      <span>🏷️ වට්ටම</span>
                      <span>-{formatCurrency(lastTxn.discount)}</span>
                    </div>
                  </>
                )}
                <div className="flex justify-between text-sm font-bold pt-1" style={{ color: 'var(--text-primary)' }}>
                  <span>මුළු එකතුව</span>
                  <span className="text-pink-600">{formatCurrency(lastTxn.total)}</span>
                </div>
                <div className="flex justify-between text-[11px]" style={{ color: 'var(--text-tertiary)' }}>
                  <span>ගෙවීම</span>
                  <span>{PAY_METHODS.find(p => p.id === lastTxn.payMethod)?.label || lastTxn.payMethod}</span>
                </div>
              </div>

              <div className="border-t border-dashed my-2" style={{ borderColor: 'var(--border-secondary)' }}></div>

              <div className="text-center text-[11px]" style={{ color: 'var(--text-tertiary)' }}>
                🙏 ස්තූතියි! නැවත එන්න! 💕<br />
                <span className="text-pink-400">✨ Lumina Salon & Spa</span>
              </div>
            </div>

            {/* Action Buttons */}
            <div className="grid grid-cols-2 gap-2">
              <button onClick={() => window.print()}
                className="py-2.5 rounded-xl text-sm font-medium flex items-center justify-center gap-2 transition-all"
                style={{ backgroundColor: 'var(--bg-tertiary)', color: 'var(--text-secondary)' }}>
                <i className="fas fa-print"></i> මුද්‍රණය
              </button>
              <button onClick={sendReceiptWhatsApp}
                className="py-2.5 bg-emerald-500 text-white rounded-xl text-sm font-medium flex items-center justify-center gap-2 hover:bg-emerald-600 transition-all shadow-md">
                <i className="fab fa-whatsapp"></i> WhatsApp
              </button>
            </div>

            <button onClick={() => setShowReceipt(false)}
              className="w-full py-2.5 btn-primary text-sm">
              <i className="fas fa-check mr-2"></i> නව විකුණුමක් ආරම්භ කරන්න
            </button>
          </div>
        )}
      </Modal>

      {/* ═══════════════════════════════════════
          QUICK SERVICE ADD MODAL
          ═══════════════════════════════════════ */}
      <Modal isOpen={showQuickAdd} onClose={() => setShowQuickAdd(false)} title="💆‍♀️ සේවාවක් එකතු කරන්න" size="lg">
        <div className="space-y-4">
          {/* Group services by category */}
          {['හිසකෙස්', 'සම', 'නිය', 'ස්පා', 'විශේෂ'].map(cat => {
            const catServices = SERVICES_LIST.filter(s => s.category === cat);
            if (catServices.length === 0) return null;
            const catLabels = {
              'හිසකෙස්': '💇‍♀️ හිසකෙස් සේවා',
              'සම': '✨ සම ආරක්ෂණ සේවා',
              'නිය': '💅 නිය සේවා',
              'ස්පා': '🧖‍♀️ ස්පා සේවා',
              'විශේෂ': '👰 විශේෂ සේවා'
            };

            return (
              <div key={cat}>
                <h4 className="text-sm font-bold mb-2 flex items-center gap-1" style={{ color: 'var(--text-primary)' }}>
                  {catLabels[cat] || cat}
                </h4>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                  {catServices.map(svc => (
                    <button key={svc.id} onClick={() => addServiceToCart(svc)}
                      className="p-3 rounded-xl border-2 text-left transition-all hover:border-pink-300 hover:shadow-sm active:scale-[0.98] group"
                      style={{ borderColor: 'var(--border-primary)', backgroundColor: 'var(--bg-secondary)' }}>
                      <div className="flex items-center gap-3">
                        <span className="text-2xl group-hover:scale-110 transition-transform">{svc.icon}</span>
                        <div className="flex-1 min-w-0">
                          <div className="text-sm font-medium truncate" style={{ color: 'var(--text-primary)' }}>{svc.name}</div>
                          <div className="text-[11px] flex items-center gap-2" style={{ color: 'var(--text-tertiary)' }}>
                            <span>⏱️ {svc.duration} min</span>
                            <span className="text-xs text-pink-500 font-bold">{formatCurrency(svc.price)}</span>
                          </div>
                        </div>
                        <div className="w-7 h-7 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all bg-pink-100">
                          <i className="fas fa-plus text-pink-500 text-xs"></i>
                        </div>
                      </div>
                    </button>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      </Modal>
    </div>
  );
}

// ✨ LUMINA SALON & SPA - PART 6
// Staff Management Tab + Appointments Tab
// ═══════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════
// 👨‍💼 STAFF MANAGEMENT TAB
// ═══════════════════════════════════════════════════════
function StaffTab() {
  const { addToast } = useToast();
  const { isDark } = useTheme();
  const [staff, setStaff] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');
  const [roleFilter, setRoleFilter] = useState('all');
  const [showForm, setShowForm] = useState(false);
  const [showProfile, setShowProfile] = useState(false);
  const [selectedStaff, setSelectedStaff] = useState(null);
  const [staffPerf, setStaffPerf] = useState(null);
  const [editStaff, setEditStaff] = useState(null);
  const [formData, setFormData] = useState({
    name: '', nameEn: '', phone: '', role: 'stylist', commission: '10',
    salary: '', skills: [], avatarColor: 0, status: 'active'
  });

  useEffect(() => { loadStaff(); }, []);

  const loadStaff = async () => {
    setLoading(true);
    setStaff(await DB.getStaff());
    setLoading(false);
  };

  const filtered = useMemo(() => {
    return staff.filter(s => {
      const matchSearch = !search || s.name.includes(search) || (s.nameEn && s.nameEn.toLowerCase().includes(search.toLowerCase())) || s.phone.includes(search);
      const matchRole = roleFilter === 'all' || s.role === roleFilter;
      return matchSearch && matchRole;
    });
  }, [staff, search, roleFilter]);

  const getRole = (roleId) => STAFF_ROLES.find(r => r.id === roleId) || { label: roleId, icon: '👤', color: 'bg-gray-100 text-gray-700' };

  const openForm = (member = null) => {
    if (member) {
      setFormData({
        name: member.name, nameEn: member.nameEn || '', phone: member.phone || '',
        role: member.role, commission: String(member.commission || 10),
        salary: String(member.salary || ''), skills: member.skills || [],
        avatarColor: member.avatarColor || 0, status: member.status || 'active'
      });
      setEditStaff(member);
    } else {
      setFormData({
        name: '', nameEn: '', phone: '', role: 'stylist', commission: '10',
        salary: '', skills: [], avatarColor: Math.floor(Math.random() * AVATAR_COLORS.length), status: 'active'
      });
      setEditStaff(null);
    }
    setShowForm(true);
  };

  const handleSave = async () => {
    if (!formData.name || !formData.phone) {
      addToast('නම සහ දුරකථන අංකය අවශ්‍යයි', 'warning');
      return;
    }
    try {
      await DB.saveStaff({
        ...formData,
        id: editStaff ? editStaff.id : undefined,
        commission: parseFloat(formData.commission) || 0,
        salary: parseFloat(formData.salary) || 0
      });
      addToast(editStaff ? 'සේවකයා යාවත්කාලීන කරන ලදී ✅' : 'නව සේවකයා එකතු කරන ලදී ✨', 'success');
      setShowForm(false);
      loadStaff();
    } catch (e) {
      addToast('දෝෂයක් ඇති විය', 'error');
    }
  };

  const handleDelete = async (id) => {
    if (!confirm('මෙම සේවකයා මකන්නද?')) return;
    await DB.deleteStaff(id);
    addToast('සේවකයා ඉවත් කරන ලදී', 'success');
    loadStaff();
  };

  const viewProfile = async (member) => {
    setSelectedStaff(member);
    setStaffPerf(await DB.getStaffPerformance(member.id));
    setShowProfile(true);
  };

  const toggleSkill = (skill) => {
    setFormData(f => ({
      ...f,
      skills: f.skills.includes(skill) ? f.skills.filter(s => s !== skill) : [...f.skills, skill]
    }));
  };

  const sendStaffWhatsApp = (member) => {
    sendWhatsApp(member.phone, `👋 ආයුබෝවන් ${member.name}!\n\n✨ Lumina Salon & Spa\n📅 ${new Date().toLocaleDateString('si-LK')}\n\nඔබගේ දිනය සුභ වේවා! 🌸`);
  };

  const activeCount = staff.filter(s => s.status === 'active').length;
  const totalSalary = staff.filter(s => s.status === 'active').reduce((s, m) => s + (m.salary || 0), 0);
  const avgRating = staff.length > 0 ? (staff.reduce((s, m) => s + (m.rating || 0), 0) / staff.length).toFixed(1) : '0';

  if (loading) return <Skeleton type="cards" />;

  return (
    <div className="space-y-5 page-enter">
      {/* Header */}
      <div className="flex flex-col sm:flex-row gap-3 items-start sm:items-center justify-between">
        <h2 className="text-xl font-bold flex items-center gap-2" style={{ color: 'var(--text-primary)' }}>
          <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-violet-500 to-purple-600 flex items-center justify-center shadow-md">
            <i className="fas fa-user-tie text-white text-sm"></i>
          </div>
          කාර්ය මණ්ඩල කළමනාකරණය
        </h2>
        <div className="flex gap-2 flex-wrap">
          <SearchInput value={search} onChange={setSearch} placeholder="සේවකයන් සොයන්න..." />
          <select value={roleFilter} onChange={e => setRoleFilter(e.target.value)} className="px-3 py-2.5 rounded-xl text-sm themed-input">
            <option value="all">සියලුම තනතුරු</option>
            {STAFF_ROLES.map(r => <option key={r.id} value={r.id}>{r.icon} {r.label}</option>)}
          </select>
          <button onClick={() => openForm()} className="btn-primary text-sm px-4 py-2.5 flex items-center gap-2"
            style={{ background: 'linear-gradient(135deg, #8b5cf6, #7c3aed)' }}>
            <i className="fas fa-user-plus"></i> <span className="hidden sm:inline">නව සේවකයා</span>
          </button>
        </div>
      </div>

      {/* Stats */}
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 sm:gap-4">
        <StatCard label="සක්‍රීය සේවකයන්" value={activeCount} icon="fa-users" gradient="from-violet-500 to-purple-500" delay={0} />
        <StatCard label="මුළු සේවකයන්" value={staff.length} icon="fa-id-badge" gradient="from-blue-500 to-indigo-500" delay={50} />
        <StatCard label="මාසික වැටුප්" value={formatCurrencyShort(totalSalary)} icon="fa-coins" gradient="from-amber-500 to-orange-500" delay={100} />
        <StatCard label="සාමාන්‍ය ශ්‍රේණිය" value={`⭐ ${avgRating}`} icon="fa-star" gradient="from-yellow-500 to-amber-500" delay={150} />
      </div>

      {/* Staff Grid */}
      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        {filtered.map((member, i) => {
          const role = getRole(member.role);
          return (
            <div key={member.id}
              className="themed-card rounded-2xl border overflow-hidden group card-hover cursor-pointer animate-slideInUp"
              style={{ animationDelay: `${Math.min(i * 50, 300)}ms` }}
              onClick={() => viewProfile(member)}>

              {/* Header gradient */}
              <div className="p-4 relative overflow-hidden"
                style={{ background: `linear-gradient(135deg, rgba(139,92,246,0.08), rgba(236,72,153,0.04))` }}>
                <div className="flex items-center gap-3">
                  <StaffAvatar name={member.name} colorIndex={member.avatarColor} size="md" />
                  <div className="flex-1 min-w-0">
                    <h4 className="font-bold text-sm truncate" style={{ color: 'var(--text-primary)' }}>{member.name}</h4>
                    <p className="text-xs truncate" style={{ color: 'var(--text-tertiary)' }}>{member.nameEn}</p>
                    <div className="flex items-center gap-2 mt-1">
                      <Badge color="purple" size="xs" icon={role.id === 'stylist' ? '' : ''}>{role.icon} {role.label}</Badge>
                      <span className={`w-2 h-2 rounded-full flex-shrink-0 ${member.status === 'active' ? 'bg-emerald-400' : member.status === 'leave' ? 'bg-amber-400' : 'bg-gray-400'}`}></span>
                    </div>
                  </div>
                  <div className="text-right">
                    <div className="text-xs font-medium" style={{ color: 'var(--text-tertiary)' }}>⭐ {member.rating || '-'}</div>
                  </div>
                </div>
              </div>

              {/* Details */}
              <div className="p-3 sm:p-4">
                <div className="flex flex-wrap gap-1 mb-3">
                  {(member.skills || []).slice(0, 3).map((skill, si) => (
                    <span key={si} className="text-[10px] px-1.5 py-0.5 rounded-full"
                      style={{ backgroundColor: 'var(--bg-tertiary)', color: 'var(--text-secondary)' }}>{skill}</span>
                  ))}
                  {(member.skills || []).length > 3 && (
                    <span className="text-[10px] px-1.5 py-0.5 rounded-full"
                      style={{ backgroundColor: 'var(--bg-tertiary)', color: 'var(--text-tertiary)' }}>+{member.skills.length - 3}</span>
                  )}
                </div>

                <div className="flex items-center justify-between text-xs" style={{ color: 'var(--text-secondary)' }}>
                  <span><i className="fas fa-phone mr-1 text-[10px]"></i>{member.phone}</span>
                  <span className="font-semibold text-violet-500">{formatCurrencyShort(member.salary)}/මාසය</span>
                </div>

                {/* Mini sales bar */}
                <div className="mt-2.5">
                  <div className="flex justify-between text-[10px] mb-1">
                    <span style={{ color: 'var(--text-tertiary)' }}>මුළු විකුණුම්</span>
                    <span className="font-medium text-pink-500">{formatCurrencyShort(member.totalSales || 0)}</span>
                  </div>
                  <div className="h-1.5 rounded-full overflow-hidden" style={{ backgroundColor: 'var(--bg-tertiary)' }}>
                    <div className="h-full rounded-full bg-gradient-to-r from-violet-400 to-pink-400 transition-all duration-700"
                      style={{ width: `${Math.min(((member.totalSales || 0) / 500000) * 100, 100)}%` }}></div>
                  </div>
                </div>
              </div>

              {/* Hover Actions */}
              <div className="border-t flex opacity-0 group-hover:opacity-100 transition-all duration-300"
                style={{ borderColor: 'var(--border-primary)' }}>
                <button onClick={(e) => { e.stopPropagation(); openForm(member); }}
                  className="flex-1 py-2.5 text-xs flex items-center justify-center gap-1 transition-all hover:bg-blue-50 text-blue-500">
                  <i className="fas fa-edit text-[10px]"></i> සංස්කරණය
                </button>
                <button onClick={(e) => { e.stopPropagation(); sendStaffWhatsApp(member); }}
                  className="flex-1 py-2.5 text-xs flex items-center justify-center gap-1 transition-all hover:bg-green-50 text-green-500 border-l"
                  style={{ borderColor: 'var(--border-primary)' }}>
                  <i className="fab fa-whatsapp text-[10px]"></i> WhatsApp
                </button>
                <button onClick={(e) => { e.stopPropagation(); handleDelete(member.id); }}
                  className="flex-1 py-2.5 text-xs flex items-center justify-center gap-1 transition-all hover:bg-red-50 text-red-400 border-l"
                  style={{ borderColor: 'var(--border-primary)' }}>
                  <i className="fas fa-trash text-[10px]"></i> මකන්න
                </button>
              </div>
            </div>
          );
        })}
      </div>

      {filtered.length === 0 && (
        <EmptyState icon="fa-users-slash" title="සේවකයන් හමු නොවීය"

// 📅 APPOINTMENTS TAB
// ═══════════════════════════════════════════════════════
function AppointmentsTab() {
  const { addToast } = useToast();
  const { isDark } = useTheme();
  const [appointments, setAppointments] = useState([]);
  const [staff, setStaff] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
  const [calendarMonth, setCalendarMonth] = useState(new Date());
  const [viewMode, setViewMode] = useState('calendar');
  const [showForm, setShowForm] = useState(false);
  const [showDetail, setShowDetail] = useState(false);
  const [selectedAppt, setSelectedAppt] = useState(null);
  const [formData, setFormData] = useState({
    customerName: '', customerPhone: '', serviceId: '', staffId: '', date: '', time: '', notes: ''
  });

  useEffect(() => { loadData(); }, []);

  const loadData = async () => {
    setLoading(true);
    const [appts, staffData] = await Promise.all([DB.getAppointments(), DB.getStaff()]);
    setAppointments(appts);
    setStaff(staffData.filter(s => s.status === 'active'));
    setLoading(false);
  };

  // Calendar
  const calendarDays = useMemo(() => {
    const year = calendarMonth.getFullYear();
    const month = calendarMonth.getMonth();
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const days = [];
    for (let i = 0; i < firstDay; i++) days.push(null);
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
      const dayAppts = appointments.filter(a => a.date === dateStr && a.status !== 'cancelled');
      days.push({ day: d, date: dateStr, appointments: dayAppts, isToday: dateStr === new Date().toISOString().split('T')[0] });
    }
    return days;
  }, [calendarMonth, appointments]);

  const selectedDateAppts = useMemo(() => {
    return appointments.filter(a => a.date === selectedDate && a.status !== 'cancelled')
      .sort((a, b) => a.time.localeCompare(b.time));
  }, [appointments, selectedDate]);

  const todayAppts = appointments.filter(a => a.date === new Date().toISOString().split('T')[0] && a.status !== 'cancelled');

  const openBooking = (date = null) => {
    setFormData({ customerName: '', customerPhone: '', serviceId: '', staffId: '', date: date || selectedDate, time: '', notes: '' });
    setShowForm(true);
  };

  const handleBook = async () => {
    if (!formData.customerName || !formData.serviceId || !formData.staffId || !formData.date || !formData.time) {
      addToast('සියලුම අවශ්‍ය තොරතුරු පුරවන්න', 'warning');
      return;
    }
    const bookedSlots = DB.getBookedSlots(formData.date, formData.staffId);
    const service = SERVICES_LIST.find(s => s.id === formData.serviceId);
    const startMins = parseInt(formData.time.split(':')[0]) * 60 + parseInt(formData.time.split(':')[1]);
    for (let m = startMins; m < startMins + (service?.duration || 30); m += 30) {
      const slotStr = `${Math.floor(m / 60).toString().padStart(2, '0')}:${(m % 60).toString().padStart(2, '0')}`;
      if (bookedSlots.includes(slotStr)) {
        addToast('මෙම කාල පරාසය දැනටමත් වෙන් කර ඇත! ❌', 'error');
        return;
      }
    }

    const staffMember = staff.find(s => s.id === formData.staffId);
    await DB.saveAppointment({
      ...formData,
      serviceName: service?.name || '',
      staffName: staffMember?.name || '',
      duration: service?.duration || 30,
      price: service?.price || 0,
      status: 'confirmed'
    });
    addToast('වේලාව සාර්ථකව වෙන් කරන ලදී! 📅 ✨', 'success');
    setShowForm(false);
    loadData();
  };

  const updateStatus = async (id, status) => {
    await DB.updateAppointmentStatus(id, status);
    const msgs = { completed: 'සම්පූර්ණ කරන ලදී ✅', cancelled: 'අවලංගු කරන ලදී ❌', confirmed: 'තහවුරු කරන ලදී ✅' };
    addToast(`වේලාව ${msgs[status] || 'යාවත්කාලීන කරන ලදී'}`, 'success');
    loadData();
    setShowDetail(false);
  };

  const sendReminder = (appt) => {
    const msg = `📅 *LUMINA SALON & SPA - වේලාව මතක් කිරීම*\n\n${appt.customerName} ආයුබෝවන්! 🙏\n\n📋 සේවාව: ${appt.serviceName}\n📅 දිනය: ${formatDate(appt.date)}\n⏰ වේලාව: ${appt.time}\n👩‍💼 සේවකයා: ${appt.staffName}\n⏱️ කාලය: ${appt.duration} min\n💰 මිල: ${formatCurrency(appt.price)}\n\nකරුණාකර නියමිත වේලාවට පැමිණෙන්න.\n📍 කොළඹ | 📞 011-2345678\n✨ Lumina Salon & Spa`;
    sendWhatsApp(appt.customerPhone, msg);
  };

  const getStatusBadge = (status) => {
    const map = {
      confirmed: { label: 'තහවුරු', color: 'green', icon: 'fa-check-circle' },
      pending: { label: 'පොරොත්තු', color: 'yellow', icon: 'fa-clock' },
      completed: { label: 'සම්පූර්ණ', color: 'blue', icon: 'fa-check-double' },
      cancelled: { label: 'අවලංගු', color: 'red', icon: 'fa-times-circle' },
      no_show: { label: 'නොපැමිණි', color: 'gray', icon: 'fa-user-slash' }
    };
    return map[status] || { label: status, color: 'gray', icon: 'fa-question' };
  };

  const prevMonth = () => setCalendarMonth(new Date(calendarMonth.getFullYear(), calendarMonth.getMonth() - 1, 1));
  const nextMonth = () => setCalendarMonth(new Date(calendarMonth.getFullYear(), calendarMonth.getMonth() + 1, 1));
  const goToday = () => { setCalendarMonth(new Date()); setSelectedDate(new Date().toISOString().split('T')[0]); };

  const availableSlots = useMemo(() => {
    if (!formData.staffId || !formData.date) return TIME_SLOTS.map(t => ({ time: t, available: true }));
    const booked = DB.getBookedSlots(formData.date, formData.staffId);
    return TIME_SLOTS.map(slot => ({ time: slot, available: !booked.includes(slot) }));
  }, [formData.staffId, formData.date, appointments]);

  const dayNames = ['ඉරි', 'සඳු', 'අඟ', 'බදා', 'බ්‍රහ', 'සිකු', 'සෙන'];

          )}

          <div>
            <label className="block text-sm font-medium mb-1" style={{ color: 'var(--text-secondary)' }}>සටහන්</label>
            <textarea value={formData.notes} onChange={e => setFormData(f => ({ ...f, notes: e.target.value }))}
              className="w-full px-3 py-2 rounded-xl text-sm h-16 resize-none themed-input" placeholder="අමතර සටහන්..." />
          </div>

          {/* Booking Summary */}
          {formData.serviceId && formData.time && (
            <div className="p-4 rounded-xl border animate-fadeIn"
              style={{ background: 'linear-gradient(135deg, rgba(16,185,129,0.05), rgba(20,184,166,0.03))', borderColor: 'rgba(16,185,129,0.2)' }}>
              <h4 className="font-bold text-emerald-800 mb-2 text-sm">📋 වෙන්කිරීම් සාරාංශය</h4>
              <div className="grid grid-cols-2 gap-2 text-xs text-emerald-700">
                <span>✂️ {SERVICES_LIST.find(s => s.id === formData.serviceId)?.name}</span>
                <span>📅 {formatDate(formData.date)}</span>
                <span>⏰ {formData.time}</span>
                <span>⏱️ {SERVICES_LIST.find(s => s.id === formData.serviceId)?.duration} min</span>
                <span>👩‍💼 {staff.find(s => s.id === formData.staffId)?.name}</span>
                <span className="font-bold">💰 {formatCurrency(SERVICES_LIST.find(s => s.id === formData.serviceId)?.price)}</span>
              </div>
            </div>
          )}

          <div className="flex gap-3 pt-2">
            <button onClick={handleBook} className="flex-1 py-3 rounded-xl font-medium text-white shadow-md text-sm transition-all hover:shadow-lg"
              style={{ background: 'linear-gradient(135deg, #10b981, #059669)' }}>
              <i className="fas fa-calendar-check mr-2"></i>වේලාව වෙන් කරන්න
            </button>
            <button onClick={() => setShowForm(false)} className="btn-secondary px-6 py-3 text-sm">අවලංගු</button>
          </div>
        </div>
      </Modal>
    </div>
  );
}

// ✨ LUMINA SALON & SPA - PART 7
// Reports Tab + Warranty Tab + Returns Tab
// ═══════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════
// 📊 REPORTS TAB
// ═══════════════════════════════════════════════════════
function ReportsTab() {
  const { addToast } = useToast();
  const [transactions, setTransactions] = useState([]);
  const [products, setProducts] = useState([]);
  const [staff, setStaff] = useState([]);
  const [loading, setLoading] = useState(true);
  const [period, setPeriod] = useState('month');

  useEffect(() => { loadData(); }, []);

  const loadData = async () => {
    setLoading(true);
    const [txns, prods, staffData] = await Promise.all([
      DB.getTransactions(), DB.getProducts(), DB.getStaff()
    ]);
    setTransactions(txns);
    setProducts(prods);
    setStaff(staffData);
    setLoading(false);
  };

  const filteredTxns = useMemo(() => {
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    return transactions.filter(t => {
      const d = new Date(t.date);
      switch (period) {
        case 'today': return d >= today;
        case 'week': return d >= new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
        case 'month': return d >= new Date(Date.now() - 30 * 24 * 60 * 60 * 1000);
        case 'year': return d >= new Date(Date.now() - 365 * 24 * 60 * 60 * 1000);
        default: return true;
      }
    });
  }, [transactions, period]);

  const totalRevenue = filteredTxns.reduce((s, t) => s + (parseFloat(t.total) || 0), 0);
  const totalDiscount = filteredTxns.reduce((s, t) => s + (parseFloat(t.discount) || 0), 0);
  const avgTxn = filteredTxns.length > 0 ? totalRevenue / filteredTxns.length : 0;

  const totalCost = filteredTxns.reduce((sum, t) => {
    if (!t.items) return sum;
    return sum + t.items.reduce((s, item) => {
      const prod = products.find(p => p.id === item.productId);
      return s + ((prod ? prod.cost : 0) * (item.qty || 1));
    }, 0);
  }, 0);
  const totalProfit = totalRevenue - totalCost;
  const profitMargin = totalRevenue > 0 ? ((totalProfit / totalRevenue) * 100).toFixed(1) : 0;

  // Payment breakdown
  const payBreakdown = {};
  filteredTxns.forEach(t => {
    const m = t.payMethod || 'cash';
    payBreakdown[m] = (payBreakdown[m] || 0) + (parseFloat(t.total) || 0);
  });

  // Category breakdown
  const catBreakdown = {};
  filteredTxns.forEach(t => {
    if (t.items) t.items.forEach(item => {
      const prod = products.find(p => p.id === item.productId);
      const cat = prod ? prod.category : 'සේවා';
      catBreakdown[cat] = (catBreakdown[cat] || 0) + (item.price * item.qty);
    });
  });

  // Staff performance
  const staffBreakdown = {};
  filteredTxns.forEach(t => {
    if (t.staffId) {
      if (!staffBreakdown[t.staffId]) staffBreakdown[t.staffId] = { revenue: 0, count: 0 };
      staffBreakdown[t.staffId].revenue += parseFloat(t.total) || 0;
      staffBreakdown[t.staffId].count += 1;
    }
  });
  const staffPerf = Object.entries(staffBreakdown)
    .map(([id, data]) => {
      const s = staff.find(st => st.id === id);
      return s ? { ...s, ...data } : null;
    })
    .filter(Boolean)
    .sort((a, b) => b.revenue - a.revenue);

  // Top products
  const prodPerf = {};
  filteredTxns.forEach(t => {
    if (t.items) t.items.forEach(item => {
      if (!prodPerf[item.productId]) prodPerf[item.productId] = { qty: 0, revenue: 0 };
      prodPerf[item.productId].qty += item.qty;
      prodPerf[item.productId].revenue += item.price * item.qty;
    });
  });
  const topProducts = Object.entries(prodPerf)
    .map(([id, data]) => ({ product: products.find(p => p.id === id), ...data }))
    .filter(x => x.product)
    .sort((a, b) => b.revenue - a.revenue)
    .slice(0, 8);

  // Daily trend for chart
  const dailyData = useMemo(() => {
    const days = period === 'today' ? 1 : period === 'week' ? 7 : period === 'month' ? 30 : 12;
    const isMonthly = period === 'year';
    const data = [];

    if (isMonthly) {
      for (let i = 11; i >= 0; i--) {
        const d = new Date();
        d.setMonth(d.getMonth() - i);
        const monthTxns = filteredTxns.filter(t => {
          const td = new Date(t.date);
          return td.getMonth() === d.getMonth() && td.getFullYear() === d.getFullYear();
        });
        data.push({
          label: d.toLocaleDateString('si-LK', { month: 'short' }),
          total: monthTxns.reduce((s, t) => s + (parseFloat(t.total) || 0), 0),
          count: monthTxns.length
        });
      }
    } else {
      for (let i = Math.min(days - 1, 13); i >= 0; i--) {
        const d = new Date(Date.now() - i * 24 * 60 * 60 * 1000);
        const dayStr = d.toDateString();
        const dayTxns = filteredTxns.filter(t => new Date(t.date).toDateString() === dayStr);
        data.push({
          label: d.toLocaleDateString('si-LK', { weekday: 'short', day: 'numeric' }),
          total: dayTxns.reduce((s, t) => s + (parseFloat(t.total) || 0), 0),
          count: dayTxns.length
        });
      }
    }
    return data;
  }, [filteredTxns, period]);

  const maxChartVal = Math.max(...dailyData.map(d => d.total), 1);

  const periods = [
    { id: 'today', label: '📅 අද' },
    { id: 'week', label: '📆 සතිය' },
    { id: 'month', label: '🗓️ මාසය' },
    { id: 'year', label: '📊 වසර' },
    { id: 'all', label: '🗃️ සියල්ල' }
  ];

  if (loading) return <Skeleton type="cards" />;

  return (
    <div className="space-y-5 page-enter">
      {/* Header + Period */}
      <div className="flex flex-col sm:flex-row gap-3 items-start sm:items-center justify-between">
        <h2 className="text-xl font-bold flex items-center gap-2" style={{ color: 'var(--text-primary)' }}>
          <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-orange-500 to-amber-500 flex items-center justify-center shadow-md">
            <i className="fas fa-chart-pie text-white text-sm"></i>
          </div>
          විකුණුම් වාර්තා
        </h2>
        <div className="flex gap-1 rounded-xl p-1" style={{ backgroundColor: 'var(--bg-tertiary)' }}>
          {periods.map(p => (
            <button key={p.id} onClick={() => setPeriod(p.id)}
              className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-all
                ${period === p.id ? 'bg-white shadow-sm text-orange-600' : ''}`}
              style={period !== p.id ? { color: 'var(--text-tertiary)' } : {}}>
              {p.label}
            </button>
          ))}
        </div>
      </div>

      {/* Summary Cards */}
      <div className="grid grid-cols-2 lg:grid-cols-5 gap-3">
        <StatCard label="මුළු ආදායම" value={formatCurrency(totalRevenue)} icon="fa-coins" gradient="from-pink-500 to-rose-500" delay={0} />
        <StatCard label="ගනුදෙනු" value={filteredTxns.length} icon="fa-receipt" gradient="from-blue-500 to-indigo-500" delay={50} />
        <StatCard label="සාමාන්‍ය ගනුදෙනුව" value={formatCurrency(avgTxn)} icon="fa-calculator" gradient="from-violet-500 to-purple-500" delay={100} />
        <StatCard label="මුළු ලාභය" value={formatCurrency(totalProfit)} icon="fa-chart-line" gradient="from-emerald-500 to-green-500" delay={150}
          sub={`${profitMargin}% margin`} />
        <StatCard label="වට්ටම්" value={formatCurrency(totalDiscount)} icon="fa-tags" gradient="from-red-500 to-pink-500" delay={200} />
      </div>

      {/* Revenue Chart */}
      <div className="themed-card rounded-2xl p-4 sm:p-5 border">
        <h3 className="font-bold mb-4 flex items-center gap-2 text-sm" style={{ color: 'var(--text-primary)' }}>
          <i className="fas fa-chart-area text-orange-500"></i> ආදායම් ප්‍රවණතාව
        </h3>
        <div className="flex items-end gap-1 sm:gap-1.5" style={{ height: '180px' }}>
          {dailyData.map((day, i) => {
            const pct = Math.max(4, (day.total / maxChartVal) * 100);
            const isLast = i === dailyData.length - 1;
            return (
              <div key={i} className="flex-1 flex flex-col items-center gap-1 group">
                <div className="opacity-0 group-hover:opacity-100 transition-all text-center">
                  <span className="text-[9px] font-bold text-pink-500 block">{formatCurrencyShort(day.total)}</span>
                  <span className="text-[8px]" style={{ color: 'var(--text-tertiary)' }}>{day.count}ක්</span>
                </div>
                <div className="w-full rounded-t-md sm:rounded-t-lg relative cursor-pointer group-hover:opacity-80 transition-all"
                  style={{ height: '140px', backgroundColor: 'var(--bg-tertiary)' }}>
                  <div className={`absolute bottom-0 w-full rounded-t-md sm:rounded-t-lg transition-all duration-700
                    ${isLast ? 'bg-gradient-to-t from-pink-500 to-pink-300' : 'bg-gradient-to-t from-orange-400 to-amber-300'}`}
                    style={{ height: `${pct}%` }}>
                  </div>
                </div>
                <span className="text-[8px] sm:text-[9px] font-medium truncate w-full text-center"
                  style={{ color: isLast ? '#ec4899' : 'var(--text-tertiary)' }}>{day.label}</span>
              </div>
            );
          })}
        </div>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
        {/* Payment Breakdown */}
        <div className="themed-card rounded-2xl p-4 sm:p-5 border">
          <h3 className="font-bold mb-4 flex items-center gap-2 text-sm" style={{ color: 'var(--text-primary)' }}>
            <i className="fas fa-credit-card text-blue-500"></i> ගෙවීම් ක්‍රම
          </h3>
          {Object.keys(payBreakdown).length === 0 ? (
            <p className="text-center py-6 text-sm" style={{ color: 'var(--text-tertiary)' }}>දත්ත නැත</p>
          ) : (
            <div className="space-y-3">
              {Object.entries(payBreakdown).sort((a, b) => b[1] - a[1]).map(([method, amount]) => {
                const pct = totalRevenue > 0 ? (amount / totalRevenue) * 100 : 0;
                const pm = PAY_METHODS.find(p => p.id === method);
                return (
                  <div key={method}>
                    <div className="flex justify-between text-xs mb-1">
                      <span className="flex items-center gap-2" style={{ color: 'var(--text-secondary)' }}>
                        <i className={`fas ${pm?.icon || 'fa-money-bill'} ${pm?.color || 'text-gray-400'}`}></i>
                        {pm?.label || method}
                      </span>
                      <span className="font-medium" style={{ color: 'var(--text-primary)' }}>
                        {formatCurrency(amount)} <span className="text-[10px]" style={{ color: 'var(--text-tertiary)' }}>({pct.toFixed(1)}%)</span>
                      </span>
                    </div>
                    <div className="h-2 rounded-full overflow-hidden" style={{ backgroundColor: 'var(--bg-tertiary)' }}>
                      <div className="h-full rounded-full bg-gradient-to-r from-blue-400 to-indigo-500 transition-all duration-700"
                        style={{ width: `${pct}%` }}></div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* Category Breakdown */}
        <div className="themed-card rounded-2xl p-4 sm:p-5 border">
          <h3 className="font-bold mb-4 flex items-center gap-2 text-sm" style={{ color: 'var(--text-primary)' }}>
            <i className="fas fa-layer-group text-amber-500"></i> වර්ග වර්ගීකරණය
          </h3>
          {Object.keys(catBreakdown).length === 0 ? (
            <p className="text-center py-6 text-sm" style={{ color: 'var(--text-tertiary)' }}>දත්ත නැත</p>
          ) : (
            <div className="space-y-3">
              {Object.entries(catBreakdown).sort((a, b) => b[1] - a[1]).map(([cat, amount]) => {
                const pct = totalRevenue > 0 ? (amount / totalRevenue) * 100 : 0;
                return (
                  <div key={cat}>
                    <div className="flex justify-between text-xs mb-1">
                      <span style={{ color: 'var(--text-secondary)' }}>{cat}</span>
                      <span className="font-medium" style={{ color: 'var(--text-primary)' }}>
                        {formatCurrency(amount)} <span className="text-[10px]" style={{ color: 'var(--text-tertiary)' }}>({pct.toFixed(1)}%)</span>
                      </span>
                    </div>
                    <div className="h-2 rounded-full overflow-hidden" style={{ backgroundColor: 'var(--bg-tertiary)' }}>
                      <div className="h-full rounded-full bg-gradient-to-r from-amber-400 to-orange-500 transition-all duration-700"
                        style={{ width: `${pct}%` }}></div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
        {/* Top Products */}
        <div className="themed-card rounded-2xl p-4 sm:p-5 border">
          <h3 className="font-bold mb-4 flex items-center gap-2 text-sm" style={{ color: 'var(--text-primary)' }}>
            <i className="fas fa-trophy text-amber-500"></i> ඉහළම නිෂ්පාදන
          </h3>
          {topProducts.length === 0 ? (
            <p className="text-center py-6 text-sm" style={{ color: 'var(--text-tertiary)' }}>දත්ත නැත</p>
          ) : (
            <div className="space-y-2">
              {topProducts.map((item, i) => (
                <div key={i} className="flex items-center gap-2.5 p-2 rounded-xl transition-all hover:shadow-sm"
                  style={{ backgroundColor: 'var(--bg-tertiary)' }}>
                  <span className="text-sm font-bold w-6 text-center">{i < 3 ? ['🥇', '🥈', '🥉'][i] : `${i + 1}`}</span>
                  <span className="text-lg">{item.product.image}</span>
                  <div className="flex-1 min-w-0">
                    <div className="text-xs font-medium truncate" style={{ color: 'var(--text-primary)' }}>{item.product.name}</div>
                    <div className="text-[10px]" style={{ color: 'var(--text-tertiary)' }}>විකුණුම් {item.qty}ක්</div>
                  </div>
                  <span className="text-xs font-bold text-pink-500">{formatCurrencyShort(item.revenue)}</span>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Staff Performance */}
        <div className="themed-card rounded-2xl p-4 sm:p-5 border">
          <h3 className="font-bold mb-4 flex items-center gap-2 text-sm" style={{ color: 'var(--text-primary)' }}>
            <i className="fas fa-users text-violet-500"></i> සේවක කාර්ය සාධනය
          </h3>
          {staffPerf.length === 0 ? (
            <p className="text-center py-6 text-sm" style={{ color: 'var(--text-tertiary)' }}>දත්ත නැත</p>
          ) : (
            <div className="space-y-2">
              {staffPerf.map((s, i) => {
                const maxRev = staffPerf[0]?.revenue || 1;
                return (
                  <div key={s.id} className="p-2.5 rounded-xl" style={{ backgroundColor: 'var(--bg-tertiary)' }}>
                    <div className="flex items-center gap-2.5 mb-1.5">
                      <StaffAvatar name={s.name} colorIndex={s.avatarColor} size="sm" />
                      <div className="flex-1 min-w-0">
                        <div className="text-xs font-medium truncate" style={{ color: 'var(--text-primary)' }}>{s.name}</div>
                        <div className="text-[10px]" style={{ color: 'var(--text-tertiary)' }}>ගනුදෙනු {s.count}ක්</div>
                      </div>
                      <span className="text-xs font-bold text-violet-500">{formatCurrencyShort(s.revenue)}</span>
                    </div>
                    <div className="h-1.5 rounded-full overflow-hidden" style={{ backgroundColor: 'var(--border-primary)' }}>
                      <div className="h-full rounded-full bg-gradient-to-r from-violet-400 to-pink-400 transition-all duration-700"
                        style={{ width: `${(s.revenue / maxRev) * 100}%` }}></div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>

      {/* Transaction History */}
      <div className="themed-card rounded-2xl p-4 sm:p-5 border">
        <h3 className="font-bold mb-4 flex items-center gap-2 text-sm" style={{ color: 'var(--text-primary)' }}>
          <i className="fas fa-list text-cyan-500"></i> ගනුදෙනු ඉතිහාසය
          <Badge color="pink" size="xs">{filteredTxns.length}</Badge>
        </h3>
        {filteredTxns.length === 0 ? (
          <EmptyState icon="fa-receipt" title="ගනුදෙනු නැත" subtitle="මෙම කාල පරාසයේ ගනුදෙනු හමු නොවීය" />
        ) : (
          <div className="overflow-x-auto max-h-80 overflow-y-auto scrollbar-thin">
            <table className="w-full text-xs sm:text-sm">
              <thead className="sticky top-0" style={{ backgroundColor: 'var(--bg-card)' }}>
                <tr className="border-b" style={{ borderColor: 'var(--border-primary)', color: 'var(--text-tertiary)' }}>
                  <th className="pb-2.5 pl-2 text-left font-medium">රිසිට්පත</th>
                  <th className="pb-2.5 text-left font-medium">දිනය</th>
                  <th className="pb-2.5 text-left font-medium hidden sm:table-cell">පාරිභෝගිකයා</th>
                  <th className="pb-2.5 text-center font-medium hidden md:table-cell">ගෙවීම</th>
                  <th className="pb-2.5 text-right font-medium">මුදල</th>
                </tr>
              </thead>
              <tbody>
                {filteredTxns.slice(0, 20).map((t, i) => (
                  <tr key={t.id} className="border-b transition-all hover:opacity-70"
                    style={{ borderColor: 'var(--border-primary)' }}>
                    <td className="py-2 pl-2"><Badge color="pink" size="xs">{t.receiptNo}</Badge></td>
                    <td className="py-2 text-[11px]" style={{ color: 'var(--text-secondary)' }}>{formatDateShort(t.date)}</td>
                    <td className="py-2 hidden sm:table-cell" style={{ color: 'var(--text-primary)' }}>{t.customerName || '-'}</td>
                    <td className="py-2 text-center hidden md:table-cell">
                      <Badge color={t.payMethod === 'cash' ? 'green' : t.payMethod === 'card' ? 'blue' : 'purple'} size="xs">
                        {PAY_METHODS.find(p => p.id === t.payMethod)?.label || t.payMethod}
                      </Badge>
                    </td>
                    <td className="py-2 text-right font-bold" style={{ color: 'var(--text-primary)' }}>{formatCurrency(t.total)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            {filteredTxns.length > 20 && (
              <p className="text-center text-xs py-3" style={{ color: 'var(--text-tertiary)' }}>
                තවත් {filteredTxns.length - 20}ක් ඇත...
              </p>
            )}
          </div>
        )}
      </div>
    </div>
  );
}
