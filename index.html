// 🛡️ WARRANTY TAB
// ═══════════════════════════════════════════════════════
function WarrantyTab() {
  const { addToast } = useToast();
  const [warranties, setWarranties] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');
  const [statusFilter, setStatusFilter] = useState('all');
  const [showClaim, setShowClaim] = useState(false);
  const [selectedWarranty, setSelectedWarranty] = useState(null);
  const [claimNote, setClaimNote] = useState('');

  useEffect(() => { loadWarranties(); }, []);

  const loadWarranties = async () => {
    setLoading(true);
    setWarranties(await DB.getWarranties());
    setLoading(false);
  };

  const filtered = warranties.filter(w => {
    const matchSearch = !search || w.customerName?.includes(search) || w.productName?.includes(search) || w.id?.includes(search);
    const isExpired = new Date(w.endDate) < new Date();
    const effectiveStatus = w.status === 'claimed' ? 'claimed' : isExpired ? 'expired' : 'active';
    const matchStatus = statusFilter === 'all' || effectiveStatus === statusFilter;
    return matchSearch && matchStatus;
  });

  const getWarrantyStatus = (w) => {
    if (w.status === 'claimed') return { label: 'හිමිකම් කර ඇත', color: 'orange', icon: 'fa-hand-paper' };
    if (new Date(w.endDate) < new Date()) return { label: 'කල් ඉකුත්', color: 'red', icon: 'fa-times-circle' };
    return { label: 'ක්‍රියාකාරී', color: 'green', icon: 'fa-check-circle' };
  };

  const handleClaim = async () => {
    if (!selectedWarranty) return;
    await DB.updateWarranty(selectedWarranty.id, { status: 'claimed', claimDate: new Date().toISOString(), claimNote });
    addToast('වගකීම් හිමිකම සටහන් කරන ලදී ✅', 'success');
    setShowClaim(false);
    setClaimNote('');
    loadWarranties();
  };

  const sendWarrantyWhatsApp = (w) => {
    if (!w.customerPhone) { addToast('දුරකථන අංකයක් නැත', 'warning'); return; }
    const status = getWarrantyStatus(w);
    sendWhatsApp(w.customerPhone,
      `🛡️ *LUMINA SALON & SPA - වගකීම් තොරතුරු*\n\n📦 නිෂ්පාදනය: ${w.productName}\n🔖 ID: ${w.id}\n📅 ආරම්භය: ${formatDate(w.startDate)}\n📅 අවසානය: ${formatDate(w.endDate)}\n📊 තත්ත්වය: ${status.label}\n\nගැටලුවක් ඇත්නම් අප හා සම්බන්ධ වන්න.\n📞 011-2345678\n✨ Lumina Salon & Spa`
    );
  };

  const activeCount = warranties.filter(w => w.status === 'active' && new Date(w.endDate) >= new Date()).length;
  const claimedCount = warranties.filter(w => w.status === 'claimed').length;
  const expiredCount = warranties.filter(w => w.status !== 'claimed' && new Date(w.endDate) < new Date()).length;

  if (loading) return <Skeleton rows={4} />;

  return (
    <div className="space-y-5 page-enter">
      <div className="flex flex-col sm:flex-row gap-3 items-start sm:items-center justify-between">
        <h2 className="text-xl font-bold flex items-center gap-2" style={{ color: 'var(--text-primary)' }}>
          <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-sky-500 to-blue-600 flex items-center justify-center shadow-md">
            <i className="fas fa-shield-halved text-white text-sm"></i>
          </div>
          වගකීම් කළමනාකරණය
        </h2>
        <div className="flex gap-2 flex-wrap">
          <SearchInput value={search} onChange={setSearch} placeholder="සොයන්න..." />
          <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)} className="px-3 py-2.5 rounded-xl text-sm themed-input">
            <option value="all">සියල්ල</option>
            <option value="active">ක්‍රියාකාරී</option>
            <option value="claimed">හිමිකම් කළ</option>
            <option value="expired">කල් ඉකුත්</option>
          </select>
        </div>
      </div>

      {/* Stats */}
      <div className="grid grid-cols-3 gap-3">
        <StatCard label="ක්‍රියාකාරී" value={activeCount} icon="fa-check-circle" gradient="from-emerald-500 to-green-500" delay={0} />
        <StatCard label="හිමිකම් කළ" value={claimedCount} icon="fa-hand-paper" gradient="from-orange-500 to-amber-500" delay={50} />
        <StatCard label="කල් ඉකුත්" value={expiredCount} icon="fa-times-circle" gradient="from-red-500 to-pink-500" delay={100} />
      </div>

      {/* Warranty List */}
      {filtered.length === 0 ? (
        <EmptyState icon="fa-shield-halved" title="වගකීම් වාර්තා නැත"
          subtitle="වගකීම් සහිත නිෂ්පාදන විකුණීමේදී ස්වයංක්‍රීයව නිර්මාණය වේ" />
      ) : (
        <div className="space-y-2.5">
          {filtered.map((w, i) => {
            const status = getWarrantyStatus(w);
            const daysLeft = Math.ceil((new Date(w.endDate) - new Date()) / (1000 * 60 * 60 * 24));
            return (
              <div key={w.id} className="themed-card rounded-xl p-4 border transition-all hover:shadow-md animate-slideInUp"
                style={{ animationDelay: `${Math.min(i * 40, 300)}ms` }}>
                <div className="flex flex-col sm:flex-row sm:items-center gap-3">
                  <div className="flex-1">
                    <div className="flex items-center gap-2 mb-1 flex-wrap">
                      <Badge color={status.color} size="sm" icon={status.icon}>{status.label}</Badge>
                      <span className="text-[11px] font-mono" style={{ color: 'var(--text-tertiary)' }}>{w.id}</span>
                    </div>
                    <h4 className="font-semibold text-sm" style={{ color: 'var(--text-primary)' }}>{w.productName}</h4>
                    <div className="flex flex-wrap gap-x-3 gap-y-1 text-[11px] mt-1" style={{ color: 'var(--text-secondary)' }}>
                      <span><i className="fas fa-user mr-1 text-[9px]"></i>{w.customerName || '-'}</span>
                      <span><i className="fas fa-phone mr-1 text-[9px]"></i>{w.customerPhone || '-'}</span>
                      <span><i className="fas fa-calendar mr-1 text-[9px]"></i>{formatDate(w.startDate)} → {formatDate(w.endDate)}</span>
                      {daysLeft > 0 && w.status === 'active' && (
                        <span className={`font-semibold ${daysLeft < 30 ? 'text-orange-500' : 'text-emerald-500'}`}>
                          දින {daysLeft}ක් ඉතිරියි
                        </span>
                      )}
                    </div>

                    {/* Progress bar for warranty remaining */}
                    {w.status === 'active' && daysLeft > 0 && (
                      <div className="mt-2">
                        <div className="h-1.5 rounded-full overflow-hidden" style={{ backgroundColor: 'var(--bg-tertiary)' }}>
                          <div className={`h-full rounded-full transition-all duration-500
                            ${daysLeft < 30 ? 'bg-gradient-to-r from-orange-400 to-red-400' : 'bg-gradient-to-r from-emerald-400 to-teal-400'}`}
                            style={{ width: `${Math.min((daysLeft / (w.months * 30)) * 100, 100)}%` }}></div>
                        </div>
                      </div>
                    )}
                  </div>
                  <div className="flex gap-2 flex-shrink-0">
                    {w.status === 'active' && daysLeft > 0 && (
                      <button onClick={() => { setSelectedWarranty(w); setShowClaim(true); }}
                        className="px-3 py-2 bg-orange-100 text-orange-700 rounded-xl text-xs font-medium hover:bg-orange-200 transition-all">
                        <i className="fas fa-hand-paper mr-1"></i>හිමිකම්
                      </button>
                    )}
                    <button onClick={() => sendWarrantyWhatsApp(w)}
                      className="px-3 py-2 bg-emerald-100 text-emerald-700 rounded-xl text-xs font-medium hover:bg-emerald-200 transition-all">
                      <i className="fab fa-whatsapp mr-1"></i>WhatsApp
                    </button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Claim Modal */}
      <Modal isOpen={showClaim} onClose={() => setShowClaim(false)} title="🛡️ වගකීම් හිමිකම්" size="sm">
        {selectedWarranty && (
          <div className="space-y-4">
            <div className="p-4 rounded-xl border" style={{ background: 'rgba(59,130,246,0.05)', borderColor: 'rgba(59,130,246,0.15)' }}>
              <div className="font-medium text-blue-800">{selectedWarranty.productName}</div>
              <div className="text-xs text-blue-600 mt-1">
                👤 {selectedWarranty.customerName} | 🔖 {selectedWarranty.id}
              </div>
            </div>
            <div>
              <label className="block text-sm font-medium mb-1" style={{ color: 'var(--text-secondary)' }}>හිමිකම් සටහන</label>
              <textarea value={claimNote} onChange={e => setClaimNote(e.target.value)}
                className="w-full px-3 py-2 rounded-xl text-sm h-24 resize-none themed-input"
                placeholder="ගැටලුව විස්තර කරන්න..." />
            </div>
            <button onClick={handleClaim}
              className="w-full py-3 rounded-xl font-medium text-white shadow-md text-sm transition-all"
              style={{ background: 'linear-gradient(135deg, #f97316, #ea580c)' }}>
              <i className="fas fa-check mr-2"></i>හිමිකම තහවුරු කරන්න
            </button>
          </div>
        )}
      </Modal>
    </div>
  );
}

// 🔄 RETURNS TAB
// ═══════════════════════════════════════════════════════
function ReturnsTab() {
  const { addToast } = useToast();
  const [returns, setReturns] = useState([]);
  const [products, setProducts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showForm, setShowForm] = useState(false);
  const [formData, setFormData] = useState({
    txnId: '', productId: '', qty: 1, reason: '', refundAmount: '', customerName: '', customerPhone: ''
  });

  useEffect(() => { loadData(); }, []);

  const loadData = async () => {
    setLoading(true);
    const [rets, prods] = await Promise.all([DB.getReturns(), DB.getProducts()]);
    setReturns(rets);
    setProducts(prods);
    setLoading(false);
  };

  const handleSubmitReturn = async () => {
    if (!formData.productId || !formData.reason) {
      addToast('නිෂ්පාදනය සහ හේතුව අවශ්‍යයි', 'warning');
      return;
    }
    const prod = products.find(p => p.id === formData.productId);
    await DB.saveReturn({
      ...formData,
      productName: prod ? prod.name : '',
      refundAmount: parseFloat(formData.refundAmount) || (prod ? prod.price * formData.qty : 0),
      qty: parseInt(formData.qty) || 1,
      status: 'completed'
    });
    addToast('ආපසු භාර ගැනීම සාර්ථකයි ✅', 'success');
    setShowForm(false);
    setFormData({ txnId: '', productId: '', qty: 1, reason: '', refundAmount: '', customerName: '', customerPhone: '' });
    loadData();
  };

  const totalRefunds = returns.reduce((s, r) => s + (parseFloat(r.refundAmount) || 0), 0);
  const monthReturns = returns.filter(r => new Date(r.date) >= new Date(Date.now() - 30 * 24 * 60 * 60 * 1000));

  const RETURN_REASONS = [
    { value: 'හානි වී ඇත', icon: '💔' },
    { value: 'වැරදි නිෂ්පාදනය', icon: '❌' },
    { value: 'ගුණත්වය අඩුයි', icon: '👎' },
    { value: 'කල් ඉකුත් වී ඇත', icon: '⏰' },
    { value: 'අනවශ්‍ය මිලදී ගැනීම', icon: '🤷‍♀️' },
    { value: 'ඇලර්ජික ප්‍රතික්‍රියා', icon: '🤧' },
    { value: 'වෙනත්', icon: '📝' }
  ];

  if (loading) return <Skeleton rows={4} />;

  return (
    <div className="space-y-5 page-enter">
      <div className="flex flex-col sm:flex-row gap-3 items-start sm:items-center justify-between">
        <h2 className="text-xl font-bold flex items-center gap-2" style={{ color: 'var(--text-primary)' }}>
          <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-red-500 to-pink-500 flex items-center justify-center shadow-md">
            <i className="fas fa-rotate-left text-white text-sm"></i>
          </div>
          ආපසු භාර ගැනීම්
        </h2>
        <button onClick={() => setShowForm(true)} className="btn-primary text-sm px-4 py-2.5 flex items-center gap-2"
          style={{ background: 'linear-gradient(135deg, #ef4444, #ec4899)' }}>
          <i className="fas fa-plus"></i> නව ආපසු භාර ගැනීමක්
        </button>
      </div>

      {/* Stats */}
      <div className="grid grid-cols-3 gap-3">
        <StatCard label="මුළු ආපසු භාර ගැනීම්" value={returns.length} icon="fa-rotate-left" gradient="from-red-500 to-pink-500" delay={0} />
        <StatCard label="මුළු ආපසු ගෙවීම්" value={formatCurrency(totalRefunds)} icon="fa-money-bill-transfer" gradient="from-orange-500 to-red-500" delay={50} />
        <StatCard label="මෙම මාසයේ" value={monthReturns.length} icon="fa-calendar" gradient="from-amber-500 to-orange-500" delay={100} />
      </div>

      {/* Returns List */}
      {returns.length === 0 ? (
        <EmptyState icon="fa-rotate-left" title="ආපසු භාර ගැනීම් නැත"
          subtitle="ආපසු භාර ගැනීමක් සටහන් කරන්න"
          action={() => setShowForm(true)} actionLabel="නව ආපසු භාර ගැනීමක්" />
      ) : (
        <div className="space-y-2.5">
          {returns.map((r, i) => (
            <div key={r.id} className="themed-card rounded-xl p-4 border transition-all hover:shadow-md animate-slideInUp"
              style={{ animationDelay: `${Math.min(i * 40, 300)}ms` }}>
              <div className="flex flex-col sm:flex-row sm:items-center gap-3">
                <div className="flex-1">
                  <div className="flex items-center gap-2 mb-1 flex-wrap">
                    <Badge color="red" size="sm" icon="fa-rotate-left">{r.id}</Badge>
                    <Badge color="green" size="xs" icon="fa-check">සම්පූර්ණ</Badge>
                  </div>
                  <h4 className="font-semibold text-sm" style={{ color: 'var(--text-primary)' }}>{r.productName || 'නිෂ්පාදනය'}</h4>
                  <div className="flex flex-wrap gap-x-3 gap-y-1 text-[11px] mt-1" style={{ color: 'var(--text-secondary)' }}>
                    <span><i className="fas fa-calendar mr-1 text-[9px]"></i>{formatDateTime(r.date)}</span>
                    <span><i className="fas fa-user mr-1 text-[9px]"></i>{r.customerName || '-'}</span>
                    <span><i className="fas fa-box mr-1 text-[9px]"></i>x{r.qty}</span>
                  </div>
                  <div className="text-xs mt-1.5 flex items-center gap-1" style={{ color: 'var(--text-tertiary)' }}>
                    <i className="fas fa-comment-dots text-[10px]"></i>
                    හේතුව: {r.reason}
                  </div>
                </div>
                <div className="text-right flex-shrink-0">
                  <div className="text-lg font-extrabold text-red-500">{formatCurrency(r.refundAmount)}</div>
                  <div className="text-[11px]" style={{ color: 'var(--text-tertiary)' }}>ආපසු ගෙවීම</div>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Return Form Modal */}
      <Modal isOpen={showForm} onClose={() => setShowForm(false)} title="🔄 නව ආපසු භාර ගැනීමක්">
        <div className="space-y-4">
          <div>
            <label className="block text-sm font-medium mb-1" style={{ color: 'var(--text-secondary)' }}>ගනුදෙනු ID (විකල්ප)</label>
            <input type="text" value={formData.txnId} onChange={e => setFormData(f => ({ ...f, txnId: e.target.value }))}
              className="w-full px-3 py-2.5 rounded-xl text-sm themed-input" placeholder="TXN..." />
          </div>

          <div>
            <label className="block text-sm font-medium mb-1" style={{ color: 'var(--text-secondary)' }}>
              නිෂ්පාදනය <span className="text-red-400">*</span>
            </label>
            <select value={formData.productId} onChange={e => {
              const prod = products.find(p => p.id === e.target.value);
              setFormData(f => ({ ...f, productId: e.target.value, refundAmount: prod ? String(prod.price) : '' }));
            }} className="w-full px-3 py-2.5 rounded-xl text-sm themed-input">
              <option value="">තෝරන්න...</option>
              {products.map(p => <option key={p.id} value={p.id}>{p.image} {p.name} - {formatCurrency(p.price)}</option>)}
            </select>
          </div>

          <div className="grid grid-cols-2 gap-4">
            <div>
              <label className="block text-sm font-medium mb-1" style={{ color: 'var(--text-secondary)' }}>ප්‍රමාණය</label>
              <input type="number" value={formData.qty} onChange={e => setFormData(f => ({ ...f, qty: e.target.value }))}
                className="w-full px-3 py-2.5 rounded-xl text-sm themed-input" min="1" />
            </div>
            <div>
              <label className="block text-sm font-medium mb-1" style={{ color: 'var(--text-secondary)' }}>ආපසු ගෙවීම (Rs.)</label>
              <input type="number" value={formData.refundAmount} onChange={e => setFormData(f => ({ ...f, refundAmount: e.target.value }))}
                className="w-full px-3 py-2.5 rounded-xl text-sm themed-input" min="0" />
            </div>
          </div>

          <div className="grid grid-cols-2 gap-4">
            <div>
              <label className="block text-sm font-medium mb-1" style={{ color: 'var(--text-secondary)' }}>පාරිභෝගික නම</label>
              <input type="text" value={formData.customerName} onChange={e => setFormData(f => ({ ...f, customerName: e.target.value }))}
                className="w-full px-3 py-2.5 rounded-xl text-sm themed-input" />
            </div>
            <div>
              <label className="block text-sm font-medium mb-1" style={{ color: 'var(--text-secondary)' }}>දුරකථන</label>
              <input type="tel" value={formData.customerPhone} onChange={e => setFormData(f => ({ ...f, customerPhone: e.target.value }))}
                className="w-full px-3 py-2.5 rounded-xl text-sm themed-input" />
            </div>
          </div>

          <div>
            <label className="block text-sm font-medium mb-2" style={{ color: 'var(--text-secondary)' }}>
              ආපසු භාර දීමේ හේතුව <span className="text-red-400">*</span>
            </label>
            <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
              {RETURN_REASONS.map(reason => (
                <button key={reason.value} onClick={() => setFormData(f => ({ ...f, reason: reason.value }))}
                  className={`p-2.5 rounded-xl border-2 text-left transition-all text-xs
                    ${formData.reason === reason.value ? 'border-red-400 bg-red-50' : ''}`}
                  style={formData.reason !== reason.value ? { borderColor: 'var(--border-primary)', backgroundColor: 'var(--bg-secondary)' } : {}}>
                  <span className="text-lg mr-1">{reason.icon}</span>
                  <span className={formData.reason === reason.value ? 'text-red-700 font-medium' : ''}
                    style={formData.reason !== reason.value ? { color: 'var(--text-primary)' } : {}}>
                    {reason.value}
                  </span>
                </button>
              ))}
            </div>
          </div>

          {formData.refundAmount && (
            <div className="p-3 rounded-xl border animate-fadeIn"
              style={{ background: 'rgba(239,68,68,0.04)', borderColor: 'rgba(239,68,68,0.15)' }}>
              <div className="flex items-center gap-2">
                <i className="fas fa-money-bill-transfer text-red-500"></i>
                <span className="text-sm text-red-700 font-medium">
                  ආපසු ගෙවීම: <strong>{formatCurrency(parseFloat(formData.refundAmount) * parseInt(formData.qty || 1))}</strong>
                </span>
              </div>
            </div>
          )}

          <div className="flex gap-3 pt-2">
            <button onClick={handleSubmitReturn}
              className="flex-1 py-3 rounded-xl font-medium text-white shadow-md text-sm transition-all"
              style={{ background: 'linear-gradient(135deg, #ef4444, #ec4899)' }}>
              <i className="fas fa-check mr-2"></i>ආපසු භාර ගනීම සටහන් කරන්න
            </button>
            <button onClick={() => setShowForm(false)} className="btn-secondary px-6 py-3 text-sm">අවලංගු</button>
          </div>
        </div>
      </Modal>
    </div>
  );
}

// 🔔 ALERTS TAB
// ═══════════════════════════════════════════════════════
function AlertsTab() {
  const { addToast } = useToast();
  const [alerts, setAlerts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState('all');

  useEffect(() => { loadAlerts(); }, []);

  const loadAlerts = async () => {
    setLoading(true);
    setAlerts(await DB.getAlerts());
    setLoading(false);
  };

  const unreadCount = alerts.filter(a => !a.read).length;

  const filtered = alerts.filter(a => {
    if (filter === 'unread') return !a.read;
    if (filter === 'low_stock') return a.type === 'low_stock';
    if (filter === 'appointment') return a.type === 'appointment';
    return true;
  });

  const markRead = async (id) => {
    await DB.markAlertRead(id);
    setAlerts(prev => prev.map(a => a.id === id ? { ...a, read: true } : a));
  };

  const markAllRead = async () => {
    await DB.markAllAlertsRead();
    setAlerts(prev => prev.map(a => ({ ...a, read: true })));
    addToast('සියලු දැනුම්දීම් කියවා ඇත ✅', 'success');
  };

  const getAlertConfig = (type) => {
    const configs = {
      low_stock: { icon: 'fa-box-open', gradient: 'from-red-500 to-pink-500', bg: 'rgba(239,68,68,0.06)', border: 'rgba(239,68,68,0.15)', label: 'තොග අඩුයි' },
      warranty: { icon: 'fa-shield-halved', gradient: 'from-blue-500 to-indigo-500', bg: 'rgba(59,130,246,0.06)', border: 'rgba(59,130,246,0.15)', label: 'වගකීම්' },
      appointment: { icon: 'fa-calendar-check', gradient: 'from-emerald-500 to-teal-500', bg: 'rgba(16,185,129,0.06)', border: 'rgba(16,185,129,0.15)', label: 'වේලාව' },
      return: { icon: 'fa-rotate-left', gradient: 'from-orange-500 to-amber-500', bg: 'rgba(249,115,22,0.06)', border: 'rgba(249,115,22,0.15)', label: 'ආපසු' },
      info: { icon: 'fa-info-circle', gradient: 'from-pink-500 to-rose-500', bg: 'rgba(236,72,153,0.06)', border: 'rgba(236,72,153,0.15)', label: 'තොරතුරු' }
    };
    return configs[type] || configs.info;
  };

  if (loading) return <Skeleton rows={5} />;

  return (
    <div className="space-y-5 page-enter">
      {/* Header */}
      <div className="flex flex-col sm:flex-row gap-3 items-start sm:items-center justify-between">
        <h2 className="text-xl font-bold flex items-center gap-2" style={{ color: 'var(--text-primary)' }}>
          <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-amber-500 to-yellow-500 flex items-center justify-center shadow-md">
            <i className="fas fa-bell text-white text-sm"></i>
          </div>
          දැනුම්දීම්
          {unreadCount > 0 && (
            <span className="bg-red-500 text-white text-xs px-2.5 py-0.5 rounded-full font-bold animate-pulse shadow-md">
              {unreadCount}
            </span>
          )}
        </h2>
        <div className="flex gap-2 flex-wrap">
          <div className="flex rounded-xl p-1" style={{ backgroundColor: 'var(--bg-tertiary)' }}>
            {[
              { id: 'all', label: 'සියල්ල', icon: 'fa-inbox' },
              { id: 'unread', label: 'නොකියවූ', icon: 'fa-eye-slash' },
              { id: 'low_stock', label: 'තොග', icon: 'fa-box' },
              { id: 'appointment', label: 'වේලාවන්', icon: 'fa-calendar' }
            ].map(f => (
              <button key={f.id} onClick={() => setFilter(f.id)}
                className={`px-2.5 sm:px-3 py-1.5 rounded-lg text-[11px] sm:text-xs font-medium transition-all flex items-center gap-1
                  ${filter === f.id ? 'bg-white shadow-sm text-amber-600' : ''}`}
                style={filter !== f.id ? { color: 'var(--text-tertiary)' } : {}}>
                <i className={`fas ${f.icon} text-[10px]`}></i>
                <span className="hidden sm:inline">{f.label}</span>
              </button>
            ))}
          </div>
          {unreadCount > 0 && (
            <button onClick={markAllRead}
              className="px-3 py-1.5 rounded-xl text-xs font-medium bg-amber-100 text-amber-700 hover:bg-amber-200 transition-all">
              <i className="fas fa-check-double mr-1"></i>සියල්ල කියවන්න
            </button>
          )}
        </div>
      </div>

      {/* Alerts List */}
      {filtered.length === 0 ? (
        <EmptyState icon="fa-bell-slash" title="දැනුම්දීම් නැත"
          subtitle="නව දැනුම්දීම් ලැබුණු විට මෙහි පෙන්නුම් කෙරේ" />
      ) : (
        <div className="space-y-2">
          {filtered.map((alert, i) => {
            const cfg = getAlertConfig(alert.type);
            return (
              <div key={alert.id}
                className={`rounded-xl p-3.5 sm:p-4 border transition-all cursor-pointer hover:shadow-md animate-slideInUp
                  ${alert.read ? 'opacity-60' : ''}`}
                style={{
                  backgroundColor: alert.read ? 'var(--bg-card)' : cfg.bg,
                  borderColor: alert.read ? 'var(--border-primary)' : cfg.border,
                  animationDelay: `${Math.min(i * 40, 400)}ms`
                }}
                onClick={() => markRead(alert.id)}>
                <div className="flex items-start gap-3">
                  <div className={`w-9 h-9 sm:w-10 sm:h-10 rounded-xl bg-gradient-to-br ${cfg.gradient} flex items-center justify-center flex-shrink-0 shadow-md`}>
                    <i className={`fas ${cfg.icon} text-white text-xs sm:text-sm`}></i>
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2">
                      <p className="text-sm font-medium flex-1" style={{ color: 'var(--text-primary)' }}>{alert.message}</p>
                      {!alert.read && (
                        <div className="w-2.5 h-2.5 rounded-full bg-gradient-to-br from-pink-500 to-rose-500 flex-shrink-0 animate-pulse shadow-sm"></div>
                      )}
                    </div>
                    <div className="flex items-center gap-2 mt-1">
                      <Badge color={alert.type === 'low_stock' ? 'red' : alert.type === 'appointment' ? 'green' : 'pink'} size="xs">
                        {cfg.label}
                      </Badge>
                      <span className="text-[11px]" style={{ color: 'var(--text-tertiary)' }}>{getRelativeTime(alert.date)}</span>
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// 🚚 RESTOCK TAB
// ═══════════════════════════════════════════════════════
function RestockTab() {
  const { addToast } = useToast();
  const [restocks, setRestocks] = useState([]);
  const [products, setProducts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showForm, setShowForm] = useState(false);
  const [formData, setFormData] = useState({
    productId: '', qty: '', supplierName: '', supplierPhone: '', unitCost: '', notes: ''
  });

  useEffect(() => { loadData(); }, []);

  const loadData = async () => {
    setLoading(true);
    const [rs, prods] = await Promise.all([DB.getRestocks(), DB.getProducts()]);
    setRestocks(rs);
    setProducts(prods);
    setLoading(false);
  };

  const lowStockProducts = products.filter(p => p.stock <= p.minStock && p.minStock > 0);

  const handleSubmit = async () => {
    if (!formData.productId || !formData.qty) {
      addToast('නිෂ්පාදනය සහ ප්‍රමාණය අවශ්‍යයි', 'warning');
      return;
    }
    const prod = products.find(p => p.id === formData.productId);
    await DB.saveRestock({
      productId: formData.productId,
      productName: prod ? prod.name : '',
      qty: parseInt(formData.qty),
      supplierName: formData.supplierName,
      supplierPhone: formData.supplierPhone,
      unitCost: parseFloat(formData.unitCost) || 0,
      totalCost: (parseFloat(formData.unitCost) || 0) * parseInt(formData.qty),
      notes: formData.notes,
      status: 'ordered'
    });
    addToast('නැවත තොග ඇණවුම සටහන් කරන ලදී 📦 ✨', 'success');
    setShowForm(false);
    setFormData({ productId: '', qty: '', supplierName: '', supplierPhone: '', unitCost: '', notes: '' });
    loadData();
  };

  const markReceived = async (restock) => {
    await DB.saveRestock({ ...restock, status: 'received', receivedDate: new Date().toISOString(), _update: true });
    addToast(`${restock.productName} තොග යාවත්කාලීන කරන ලදී ✅ 📦`, 'success');
    loadData();
  };

  const sendRestockWhatsApp = (restock) => {
    if (!restock.supplierPhone) { addToast('සැපයුම්කරු දුරකථනයක් නැත', 'warning'); return; }
    sendWhatsApp(restock.supplierPhone,
      `📦 *LUMINA SALON & SPA - තොග ඇණවුම*\n\n🔖 ඇණවුම් ID: ${restock.id}\n📦 නිෂ්පාදනය: ${restock.productName}\n📊 ප්‍රමාණය: ${restock.qty}\n📅 දිනය: ${formatDate(restock.orderDate)}\n\nකරුණාකර ඉක්මනින් සපයන්න.\n🙏 ස්තූතියි!\n✨ Lumina Salon & Spa | 📞 011-2345678`
    );
  };

  const pendingCount = restocks.filter(r => r.status === 'ordered').length;
  const receivedCount = restocks.filter(r => r.status === 'received').length;

  if (loading) return <Skeleton type="cards" />;

  return (
    <div className="space-y-5 page-enter">
      {/* Header */}
      <div className="flex flex-col sm:flex-row gap-3 items-start sm:items-center justify-between">
        <h2 className="text-xl font-bold flex items-center gap-2" style={{ color: 'var(--text-primary)' }}>
          <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center shadow-md">
            <i className="fas fa-truck-fast text-white text-sm"></i>
          </div>
          නැවත තොග කළමනාකරණය
        </h2>
        <button onClick={() => setShowForm(true)} className="btn-primary text-sm px-4 py-2.5 flex items-center gap-2"
          style={{ background: 'linear-gradient(135deg, #6366f1, #7c3aed)' }}>
          <i className="fas fa-plus"></i> නව ඇණවුමක්
        </button>
      </div>

      {/* Low Stock Alert */}
      {lowStockProducts.length > 0 && (
        <div className="rounded-2xl p-4 sm:p-5 border animate-fadeIn"
          style={{ background: 'linear-gradient(135deg, rgba(239,68,68,0.04), rgba(236,72,153,0.02))', borderColor: 'rgba(239,68,68,0.15)' }}>
          <h3 className="font-bold text-red-700 mb-3 flex items-center gap-2 text-sm">
            <i className="fas fa-exclamation-triangle animate-pulse"></i>
            තොග අඩු නිෂ්පාදන ({lowStockProducts.length})
          </h3>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2.5">
            {lowStockProducts.map((p, i) => (
              <div key={p.id} className="rounded-xl p-3 flex items-center gap-2.5 border shadow-sm animate-slideInUp"
                style={{ backgroundColor: 'var(--bg-card)', borderColor: 'var(--border-primary)', animationDelay: `${i * 50}ms` }}>
                <span className="text-xl">{p.image}</span>
                <div className="flex-1 min-w-0">
                  <div className="text-xs font-medium truncate" style={{ color: 'var(--text-primary)' }}>{p.name}</div>
                  <div className="text-[10px] text-red-500 font-medium">
                    තොග: <strong>{p.stock}</strong> / අවම: {p.minStock}
                  </div>
                  {/* Stock level bar */}
                  <div className="h-1 rounded-full overflow-hidden mt-1" style={{ backgroundColor: 'var(--bg-tertiary)' }}>
                    <div className="h-full rounded-full bg-gradient-to-r from-red-500 to-orange-400"
                      style={{ width: `${Math.min((p.stock / Math.max(p.minStock, 1)) * 100, 100)}%` }}></div>
                  </div>
                </div>
                <button onClick={() => { setFormData(f => ({ ...f, productId: p.id })); setShowForm(true); }}
                  className="px-2 py-1.5 bg-indigo-100 text-indigo-700 rounded-lg text-[10px] font-medium hover:bg-indigo-200 transition-all flex-shrink-0">
                  <i className="fas fa-cart-plus mr-0.5"></i>ඇණවුම
                </button>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Stats */}
      <div className="grid grid-cols-3 gap-3">
        <StatCard label="මුළු ඇණවුම්" value={restocks.length} icon="fa-boxes-stacked" gradient="from-indigo-500 to-violet-500" delay={0} />
        <StatCard label="ලැබීමට ඉතිරි" value={pendingCount} icon="fa-clock" gradient="from-amber-500 to-orange-500" delay={50} />
        <StatCard label="ලැබුණු" value={receivedCount} icon="fa-check-double" gradient="from-emerald-500 to-green-500" delay={100} />
      </div>

      {/* Restock Orders */}
      {restocks.length === 0 ? (
        <EmptyState icon="fa-truck" title="ඇණවුම් නැත"
          subtitle="නව තොග ඇණවුමක් එකතු කරන්න"
          action={() => setShowForm(true)} actionLabel="නව ඇණවුමක්" />
      ) : (
        <div className="space-y-2.5">
          {restocks.map((rs, i) => (
            <div key={rs.id} className="themed-card rounded-xl p-4 border transition-all hover:shadow-md animate-slideInUp"
              style={{ animationDelay: `${Math.min(i * 40, 300)}ms` }}>
              <div className="flex flex-col sm:flex-row sm:items-center gap-3">
                <div className="flex-1">
                  <div className="flex items-center gap-2 mb-1 flex-wrap">
                    <Badge
                      color={rs.status === 'received' ? 'green' : 'yellow'}
                      size="sm"
                      icon={rs.status === 'received' ? 'fa-check-double' : 'fa-clock'}>
                      {rs.status === 'received' ? '✅ ලැබුණා' : '⏳ ඇණවුම් කළා'}
                    </Badge>
                    <span className="text-[11px] font-mono" style={{ color: 'var(--text-tertiary)' }}>{rs.id}</span>
                  </div>
                  <h4 className="font-semibold text-sm" style={{ color: 'var(--text-primary)' }}>{rs.productName}</h4>
                  <div className="flex flex-wrap gap-x-3 gap-y-1 text-[11px] mt-1" style={{ color: 'var(--text-secondary)' }}>
                    <span><i className="fas fa-cubes mr-1 text-[9px]"></i>ප්‍රමාණය: <strong>{rs.qty}</strong></span>
                    <span><i className="fas fa-store mr-1 text-[9px]"></i>{rs.supplierName || 'සැපයුම්කරු'}</span>
                    <span><i className="fas fa-calendar mr-1 text-[9px]"></i>{formatDate(rs.orderDate)}</span>
                    {rs.totalCost > 0 && (
                      <span><i className="fas fa-coins mr-1 text-[9px]"></i>{formatCurrency(rs.totalCost)}</span>
                    )}
                  </div>
                  {rs.notes && (
                    <div className="text-[11px] mt-1" style={{ color: 'var(--text-tertiary)' }}>
                      📝 {rs.notes}
                    </div>
                  )}
                </div>
                <div className="flex gap-2 flex-shrink-0">
                  {rs.status === 'ordered' && (
                    <button onClick={() => markReceived(rs)}
                      className="px-3 py-2 bg-emerald-100 text-emerald-700 rounded-xl text-xs font-medium hover:bg-emerald-200 transition-all shadow-sm">
                      <i className="fas fa-check mr-1"></i>ලැබුණා
                    </button>
                  )}
                  <button onClick={() => sendRestockWhatsApp(rs)}
                    className="px-3 py-2 bg-green-50 text-green-600 rounded-xl text-xs font-medium hover:bg-green-100 transition-all">
                    <i className="fab fa-whatsapp mr-1"></i>WhatsApp
                  </button>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Restock Form Modal */}
      <Modal isOpen={showForm} onClose={() => setShowForm(false)} title="📦 නව තොග ඇණවුම">
        <div className="space-y-4">
          <div>
            <label className="block text-sm font-medium mb-1" style={{ color: 'var(--text-secondary)' }}>
              නිෂ්පාදනය <span className="text-red-400">*</span>
            </label>
            <select value={formData.productId} onChange={e => setFormData(f => ({ ...f, productId: e.target.value }))}
              className="w-full px-3 py-2.5 rounded-xl text-sm themed-input">
              <option value="">තෝරන්න...</option>
              {products.map(p => (
                <option key={p.id} value={p.id}>
                  {p.image} {p.name} (තොග: {p.stock}{p.stock <= p.minStock && p.minStock > 0 ? ' ⚠️' : ''})
                </option>
              ))}
            </select>
          </div>

          <div className="grid grid-cols-2 gap-4">
            <div>
              <label className="block text-sm font-medium mb-1" style={{ color: 'var(--text-secondary)' }}>
                ප්‍රමාණය <span className="text-red-400">*</span>
              </label>
              <input type="number" value={formData.qty} onChange={e => setFormData(f => ({ ...f, qty: e.target.value }))}
                className="w-full px-3 py-2.5 rounded-xl text-sm themed-input" min="1" />
            </div>
            <div>
              <label className="block text-sm font-medium mb-1" style={{ color: 'var(--text-secondary)' }}>ඒකක පිරිවැය (Rs.)</label>
              <input type="number" value={formData.unitCost} onChange={e => setFormData(f => ({ ...f, unitCost: e.target.value }))}
                className="w-full px-3 py-2.5 rounded-xl text-sm themed-input" min="0" />
            </div>
          </div>

          {formData.qty && formData.unitCost && (
            <div className="p-3 rounded-xl border animate-fadeIn"
              style={{ background: 'rgba(99,102,241,0.04)', borderColor: 'rgba(99,102,241,0.15)' }}>
              <span className="text-sm text-indigo-700 font-medium">
                💰 මුළු පිරිවැය: <strong>{formatCurrency(parseInt(formData.qty) * parseFloat(formData.unitCost))}</strong>
              </span>
            </div>
          )}

          <div className="grid grid-cols-2 gap-4">
            <div>
              <label className="block text-sm font-medium mb-1" style={{ color: 'var(--text-secondary)' }}>සැපයුම්කරු නම</label>
              <input type="text" value={formData.supplierName} onChange={e => setFormData(f => ({ ...f, supplierName: e.target.value }))}
                className="w-full px-3 py-2.5 rounded-xl text-sm themed-input" />
            </div>
            <div>
              <label className="block text-sm font-medium mb-1" style={{ color: 'var(--text-secondary)' }}>සැපයුම්කරු දුරකථන</label>
              <input type="tel" value={formData.supplierPhone} onChange={e => setFormData(f => ({ ...f, supplierPhone: e.target.value }))}
                className="w-full px-3 py-2.5 rounded-xl text-sm themed-input" />
            </div>
          </div>

          <div>
            <label className="block text-sm font-medium mb-1" style={{ color: 'var(--text-secondary)' }}>සටහන්</label>
            <textarea value={formData.notes} onChange={e => setFormData(f => ({ ...f, notes: e.target.value }))}
              className="w-full px-3 py-2 rounded-xl text-sm h-16 resize-none themed-input" placeholder="අමතර සටහන්..." />
          </div>

          <div className="flex gap-3 pt-2">
            <button onClick={handleSubmit}
              className="flex-1 py-3 rounded-xl font-medium text-white shadow-md text-sm transition-all"
              style={{ background: 'linear-gradient(135deg, #6366f1, #7c3aed)' }}>
              <i className="fas fa-paper-plane mr-2"></i>ඇණවුම යවන්න
            </button>
            <button onClick={() => setShowForm(false)} className="btn-secondary px-6 py-3 text-sm">අවලංගු</button>
          </div>
        </div>
      </Modal>
    </div>
  );
}


// ═══════════════════════════════════════════════════════
// 🏠 MAIN APP COMPONENT
// ═══════════════════════════════════════════════════════
function App() {
  const [activeTab, setActiveTab] = useState('dashboard');
  const [isLoading, setIsLoading] = useState(true);
  const [isOnline, setIsOnline] = useState(typeof google !== 'undefined' && !!google.script);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [alertCount, setAlertCount] = useState(0);

  useEffect(() => {
    const timer = setTimeout(() => setIsLoading(false), 2200);
    return () => clearTimeout(timer);
  }, []);

  useEffect(() => {
    const load = async () => {
      const alerts = await DB.getAlerts();
      setAlertCount(alerts.filter(a => !a.read).length);
    };
    load();
    const interval = setInterval(load, 30000);
    return () => clearInterval(interval);
  }, [activeTab]);

  if (isLoading) return <LoadingScreen />;

  const renderTab = () => {
    switch (activeTab) {
      case 'dashboard': return <DashboardTab />;
      case 'catalog': return <CatalogTab />;
      case 'pos': return <POSTab />;
      case 'staff': return <StaffTab />;
      case 'appointments': return <AppointmentsTab />;
      case 'reports': return <ReportsTab />;
      case 'warranty': return <WarrantyTab />;
      case 'returns': return <ReturnsTab />;
      case 'alerts': return <AlertsTab />;
      case 'restock': return <RestockTab />;
      default: return <DashboardTab />;
    }
  };

  const mobileNavTabs = ['dashboard', 'pos', 'appointments', 'staff', 'alerts']
    .map(id => TABS.find(t => t.id === id));

  return (
    <ThemeProvider>
      <ToastProvider>
        <AppShell
          activeTab={activeTab} setActiveTab={setActiveTab}
          isOnline={isOnline} sidebarOpen={sidebarOpen} setSidebarOpen={setSidebarOpen}
          alertCount={alertCount} renderTab={renderTab} mobileNavTabs={mobileNavTabs}
        />
      </ToastProvider>
    </ThemeProvider>
  );
}

// ═══════════════════════════════════════════════════════
// 🏗️ APP SHELL (Layout with Sidebar + Header + Content)
// ═══════════════════════════════════════════════════════
function AppShell({ activeTab, setActiveTab, isOnline, sidebarOpen, setSidebarOpen, alertCount, renderTab, mobileNavTabs }) {
  const { isDark } = useTheme();
  const currentTab = TABS.find(t => t.id === activeTab);

  return (
    <div className="min-h-screen flex" style={{ backgroundColor: 'var(--bg-primary)' }}>

      {/* Mobile Overlay */}
      {sidebarOpen && (
        <div className="fixed inset-0 z-30 lg:hidden transition-opacity duration-300"
          style={{ backgroundColor: 'var(--overlay-bg)', backdropFilter: 'blur(4px)' }}
          onClick={() => setSidebarOpen(false)}></div>
      )}

      {/* ═══ SIDEBAR ═══ */}
      <aside className={`fixed lg:static inset-y-0 left-0 z-40 w-[260px] themed-sidebar border-r
        transform transition-transform duration-300 lg:transform-none flex flex-col shadow-lg lg:shadow-sm
        ${sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}
        style={{ borderColor: 'var(--border-primary)' }}>

        {/* Logo */}
        <div className="p-4 sm:p-5 border-b flex-shrink-0" style={{ borderColor: 'var(--border-primary)' }}>
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 bg-gradient-to-br from-pink-500 to-rose-500 rounded-xl flex items-center justify-center shadow-lg animate-pulseGlow">
                <span className="text-xl">✨</span>
              </div>
              <div>
                <h1 className="font-extrabold text-sm tracking-tight leading-tight" style={{ color: 'var(--text-primary)' }}>Lumina</h1>
                <p className="text-[10px] font-medium tracking-wider uppercase leading-tight" style={{ color: 'var(--text-tertiary)' }}>Salon & Spa</p>
              </div>
            </div>
            <ThemeToggle />
          </div>
        </div>

        {/* Nav */}
        <nav className="flex-1 p-2.5 overflow-y-auto scrollbar-thin">
          <div className="space-y-0.5">
            {TABS.map((tab, i) => {
              const isActive = activeTab === tab.id;
              return (
                <button key={tab.id} onClick={() => { setActiveTab(tab.id); setSidebarOpen(false); }}
                  className={`w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm transition-all duration-200 relative group
                    ${isActive ? 'font-semibold shadow-sm' : 'hover:opacity-80'}`}
                  style={isActive
                    ? { background: `linear-gradient(135deg, rgba(236,72,153,0.08), rgba(168,85,247,0.05))`, color: '#ec4899' }
                    : { color: 'var(--text-secondary)' }}>

                  {/* Active indicator */}
                  {isActive && <div className="tab-indicator"></div>}

                  <div className={`w-8 h-8 rounded-lg flex items-center justify-center transition-all flex-shrink-0
                    ${isActive ? `bg-gradient-to-br ${tab.color} shadow-md` : ''}`}
                    style={!isActive ? { backgroundColor: 'var(--bg-tertiary)', color: 'var(--text-tertiary)' } : {}}>
                    <i className={`fas ${tab.icon} text-xs ${isActive ? 'text-white' : ''}`}></i>
                  </div>

                  <span className="truncate">{tab.label}</span>

                  {/* Alert badge */}
                  {tab.id === 'alerts' && alertCount > 0 && (
                    <span className="notification-badge">{alertCount > 9 ? '9+' : alertCount}</span>
                  )}

                  {/* Hover sparkle */}
                  <span className="absolute right-3 opacity-0 group-hover:opacity-40 transition-opacity text-xs">✨</span>
                </button>
              );
            })}
          </div>
        </nav>

        {/* Sidebar Footer */}
        <div className="p-4 border-t flex-shrink-0 space-y-2" style={{ borderColor: 'var(--border-primary)' }}>
          <SyncStatus isOnline={isOnline} />
          <div className="text-[10px] text-center flex items-center justify-center gap-1" style={{ color: 'var(--text-tertiary)' }}>
            <span>✨</span> v3.0.0 | © 2024 Lumina <span>✨</span>
          </div>
        </div>
      </aside>

      {/* ═══ MAIN CONTENT ═══ */}
      <main className="flex-1 flex flex-col min-w-0">

        {/* Header */}
        <header className="themed-header border-b px-3 sm:px-4 lg:px-6 py-2.5 sm:py-3 flex items-center justify-between sticky top-0 z-20 shadow-sm flex-shrink-0"
          style={{ borderColor: 'var(--border-primary)' }}>
          <div className="flex items-center gap-2.5 sm:gap-3">
            <button onClick={() => setSidebarOpen(!sidebarOpen)}
              className="lg:hidden w-9 h-9 rounded-xl flex items-center justify-center transition-all active:scale-90"
              style={{ backgroundColor: 'var(--bg-tertiary)' }}>
              <i className="fas fa-bars text-sm" style={{ color: 'var(--text-secondary)' }}></i>
            </button>
            <div>
              <h2 className="font-bold text-base sm:text-lg leading-tight" style={{ color: 'var(--text-primary)' }}>
                {currentTab?.label}
              </h2>
              <p className="text-[10px] sm:text-xs hidden sm:block leading-tight" style={{ color: 'var(--text-tertiary)' }}>
                {currentTab?.labelEn}
              </p>
            </div>
          </div>

          <div className="flex items-center gap-1.5 sm:gap-2">
            {/* Theme toggle mobile */}
            <div className="sm:hidden">
              <ThemeToggle compact />
            </div>

            {/* Alert bell */}
            <button onClick={() => { setActiveTab('alerts'); setSidebarOpen(false); }}
              className="relative w-9 h-9 rounded-xl flex items-center justify-center transition-all hover:scale-105 active:scale-95"
              style={{ backgroundColor: 'var(--bg-tertiary)' }}>
              <i className="fas fa-bell text-sm" style={{ color: 'var(--text-secondary)' }}></i>
              {alertCount > 0 && (
                <span className="notification-badge" style={{ top: '-3px', right: '-3px' }}>
                  {alertCount > 9 ? '9+' : alertCount}
                </span>
              )}
            </button>

            {/* Sync status */}
            <div className="hidden sm:block">
              <SyncStatus isOnline={isOnline} />
            </div>

            {/* User avatar */}
            <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-pink-400 to-rose-500 flex items-center justify-center text-white text-sm font-bold shadow-md cursor-pointer hover:scale-105 transition-transform"
              title="Lumina Salon">
              LS
            </div>
          </div>
        </header>

        {/* Page Content */}
        <div className="flex-1 p-3 sm:p-4 lg:p-6 overflow-y-auto scrollbar-thin pb-20 lg:pb-6">
          {renderTab()}
        </div>

        {/* ═══ MOBILE BOTTOM NAV ═══ */}
        <div className="lg:hidden fixed bottom-0 left-0 right-0 themed-header border-t z-20 shadow-lg safe-bottom"
          style={{ borderColor: 'var(--border-primary)' }}>
          <div className="flex justify-around px-1 py-1">
            {mobileNavTabs.map(tab => tab && (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                className={`flex flex-col items-center py-1.5 px-1.5 sm:px-3 rounded-xl transition-all relative
                  ${activeTab === tab.id ? 'text-pink-500' : ''}`}
                style={activeTab !== tab.id ? { color: 'var(--text-tertiary)' } : {}}>

                {activeTab === tab.id && (
                  <div className="absolute -top-1 left-1/2 -translate-x-1/2 w-5 h-1 rounded-full bg-gradient-to-r from-pink-500 to-rose-500"></div>
                )}

                <div className={`w-7 h-7 rounded-lg flex items-center justify-center mb-0.5 transition-all
                  ${activeTab === tab.id ? `bg-gradient-to-br ${tab.color} shadow-md` : ''}`}>
                  <i className={`fas ${tab.icon} text-[11px] ${activeTab === tab.id ? 'text-white' : ''}`}></i>
                </div>

                <span className="text-[9px] font-medium leading-none">{tab.label}</span>

                {tab.id === 'alerts' && alertCount > 0 && (
                  <span className="absolute top-0 right-0 sm:right-1 w-4 h-4 bg-red-500 text-white text-[7px] rounded-full flex items-center justify-center font-bold shadow-md animate-pulse">
                    {alertCount > 9 ? '9+' : alertCount}
                  </span>
                )}
              </button>
            ))}

            {/* More button */}
            <button onClick={() => setSidebarOpen(true)}
              className="flex flex-col items-center py-1.5 px-1.5 sm:px-3 rounded-xl transition-all"
              style={{ color: 'var(--text-tertiary)' }}>
              <div className="w-7 h-7 rounded-lg flex items-center justify-center mb-0.5"
                style={{ backgroundColor: 'var(--bg-tertiary)' }}>
                <i className="fas fa-ellipsis text-[11px]"></i>
              </div>
              <span className="text-[9px] font-medium leading-none">තව</span>
            </button>
          </div>
        </div>
      </main>
    </div>
  );
}
