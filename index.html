<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#ec4899">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>✨ Lumina Salon & Spa - කළමනාකරණ පද්ධතිය</title>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts - Sinhala + English -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Font Awesome 6 Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            lumina: {
              50:'#fdf2f8', 100:'#fce7f3', 200:'#fbcfe8', 300:'#f9a8d4',
              400:'#f472b6', 500:'#ec4899', 600:'#db2777', 700:'#be185d',
              800:'#9d174d', 900:'#831843', 950:'#500724'
            },
            gold: {
              50:'#fffbeb', 100:'#fef3c7', 200:'#fde68a', 300:'#fcd34d',
              400:'#fbbf24', 500:'#f59e0b', 600:'#d97706', 700:'#b45309',
              800:'#92400e', 900:'#78350f'
            },
            spa: {
              50:'#f0fdf4', 100:'#dcfce7', 200:'#bbf7d0', 300:'#86efac',
              400:'#4ade80', 500:'#22c55e', 600:'#16a34a', 700:'#15803d',
              800:'#166534', 900:'#14532d'
            },
            rose: {
              50:'#fff1f2', 100:'#ffe4e6', 200:'#fecdd3', 300:'#fda4af',
              400:'#fb7185', 500:'#f43f5e', 600:'#e11d48', 700:'#be123c',
              800:'#9f1239', 900:'#881337'
            },
            lavender: {
              50:'#faf5ff', 100:'#f3e8ff', 200:'#e9d5ff', 300:'#d8b4fe',
              400:'#c084fc', 500:'#a855f7', 600:'#9333ea', 700:'#7e22ce',
              800:'#6b21a8', 900:'#581c87'
            }
          },
          fontFamily: {
            sinhala: ['"Noto Sans Sinhala"', '"Inter"', 'sans-serif'],
            display: ['"Inter"', '"Noto Sans Sinhala"', 'sans-serif']
          },
          boxShadow: {
            'glow-pink': '0 0 20px rgba(236, 72, 153, 0.3)',
            'glow-gold': '0 0 20px rgba(245, 158, 11, 0.3)',
            'glow-purple': '0 0 20px rgba(168, 85, 247, 0.3)',
            'soft': '0 2px 15px rgba(0, 0, 0, 0.05)',
            'medium': '0 4px 25px rgba(0, 0, 0, 0.08)',
            'strong': '0 8px 40px rgba(0, 0, 0, 0.12)'
          }
        }
      }
    }
  </script>

  <style>
    /* ═══════════════════════════════════════════════════════
       ✨ LUMINA SALON & SPA - MASTER STYLESHEET
       Version: 3.0 | Dark Mode Ready | Girl-Friendly UI
       ═══════════════════════════════════════════════════════ */

    * {
      font-family: 'Noto Sans Sinhala', 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    /* ═══ CSS CUSTOM PROPERTIES (Light/Dark Themes) ═══ */
    :root {
      /* ── Backgrounds ── */
      --bg-primary: #faf5ff;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f8f4ff;
      --bg-hover: #fdf2f8;
      --bg-card: #ffffff;
      --bg-input: #ffffff;
      --bg-sidebar: #ffffff;
      --bg-header: rgba(255, 255, 255, 0.92);

      /* ── Borders ── */
      --border-primary: #fce7f3;
      --border-secondary: #f3e8ff;
      --border-input: #e9d5ff;
      --border-focus: #ec4899;

      /* ── Text ── */
      --text-primary: #1f2937;
      --text-secondary: #6b7280;
      --text-tertiary: #9ca3af;
      --text-accent: #ec4899;

      /* ── Effects ── */
      --shadow-sm: 0 1px 3px rgba(236, 72, 153, 0.04), 0 1px 2px rgba(0, 0, 0, 0.03);
      --shadow-md: 0 4px 12px rgba(236, 72, 153, 0.06), 0 2px 4px rgba(0, 0, 0, 0.04);
      --shadow-lg: 0 10px 30px rgba(236, 72, 153, 0.08), 0 4px 8px rgba(0, 0, 0, 0.05);
      --shadow-xl: 0 20px 50px rgba(236, 72, 153, 0.12);
      --glass-bg: rgba(255, 255, 255, 0.88);
      --overlay-bg: rgba(253, 242, 248, 0.6);

      /* ── Gradients ── */
      --gradient-primary: linear-gradient(135deg, #ec4899, #f472b6);
      --gradient-secondary: linear-gradient(135deg, #a855f7, #c084fc);
      --gradient-gold: linear-gradient(135deg, #f59e0b, #fbbf24);
      --gradient-spa: linear-gradient(135deg, #22c55e, #4ade80);
      --gradient-hero: linear-gradient(135deg, #ec4899, #a855f7, #f59e0b);
      --gradient-sidebar: linear-gradient(180deg, #ffffff, #fdf2f8);

      /* ── Shimmer ── */
      --shimmer-1: #fce7f3;
      --shimmer-2: #fbcfe8;

      /* ── Scrollbar ── */
      --scrollbar-track: #fdf2f8;
      --scrollbar-thumb: #f9a8d4;
      --scrollbar-hover: #f472b6;
    }

    /* ═══ DARK MODE ═══ */
    [data-theme="dark"] {
      --bg-primary: #0c0a1a;
      --bg-secondary: #1a1630;
      --bg-tertiary: #252040;
      --bg-hover: #2a2450;
      --bg-card: #1a1630;
      --bg-input: #252040;
      --bg-sidebar: #12102a;
      --bg-header: rgba(18, 16, 42, 0.92);

      --border-primary: #2a2450;
      --border-secondary: #352e5e;
      --border-input: #3d3570;
      --border-focus: #ec4899;

      --text-primary: #f1f0ff;
      --text-secondary: #a5a0cc;
      --text-tertiary: #6b65a0;
      --text-accent: #f472b6;

      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 10px 30px rgba(0, 0, 0, 0.5);
      --shadow-xl: 0 20px 50px rgba(0, 0, 0, 0.6);
      --glass-bg: rgba(26, 22, 48, 0.92);
      --overlay-bg: rgba(12, 10, 26, 0.7);

      --gradient-sidebar: linear-gradient(180deg, #12102a, #1a1630);

      --shimmer-1: #252040;
      --shimmer-2: #352e5e;

      --scrollbar-track: #12102a;
      --scrollbar-thumb: #3d3570;
      --scrollbar-hover: #4e45a0;
    }

    /* ═══ BASE STYLES ═══ */
    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                  color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-x: hidden;
      min-height: 100vh;
    }

    ::selection {
      background-color: rgba(236, 72, 153, 0.2);
      color: #be185d;
    }

    [data-theme="dark"] ::selection {
      background-color: rgba(244, 114, 182, 0.3);
      color: #fce7f3;
    }

    /* ═══ ANIMATIONS ═══ */
    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes slideInDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInScale {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes bounceIn {
      0% { transform: scale(0.3); opacity: 0; }
      40% { transform: scale(1.08); }
      60% { transform: scale(0.95); }
      80% { transform: scale(1.02); }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 5px rgba(236, 72, 153, 0.2), 0 0 10px rgba(236, 72, 153, 0.1); }
      50% { box-shadow: 0 0 15px rgba(236, 72, 153, 0.4), 0 0 30px rgba(236, 72, 153, 0.15); }
    }

    @keyframes pulseGlowGold {
      0%, 100% { box-shadow: 0 0 5px rgba(245, 158, 11, 0.2); }
      50% { box-shadow: 0 0 20px rgba(245, 158, 11, 0.4); }
    }

    @keyframes spinSlow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes spinReverse {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    @keyframes floatRotate {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      25% { transform: translateY(-5px) rotate(2deg); }
      50% { transform: translateY(-8px) rotate(0deg); }
      75% { transform: translateY(-3px) rotate(-2deg); }
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      10% { transform: scale(1.1); }
      20% { transform: scale(1); }
      30% { transform: scale(1.05); }
      40% { transform: scale(1); }
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
      50% { opacity: 1; transform: scale(1) rotate(180deg); }
    }

    @keyframes ripple {
      0% { transform: scale(0); opacity: 0.6; }
      100% { transform: scale(4); opacity: 0; }
    }

    @keyframes calendarPop {
      from { transform: scale(0.85); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes progressFill {
      from { width: 0%; }
      to { width: var(--progress-width, 100%); }
    }

    @keyframes typewriter {
      from { width: 0; }
      to { width: 100%; }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    @keyframes confetti {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    /* ═══ ANIMATION CLASSES ═══ */
    .animate-slideInRight { animation: slideInRight 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
    .animate-slideInLeft { animation: slideInLeft 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
    .animate-slideInUp { animation: slideInUp 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .animate-slideInDown { animation: slideInDown 0.3s ease-out; }
    .animate-fadeIn { animation: fadeIn 0.4s ease-out; }
    .animate-fadeInScale { animation: fadeInScale 0.3s ease-out; }
    .animate-bounceIn { animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
    .animate-pulseGlow { animation: pulseGlow 2.5s ease-in-out infinite; }
    .animate-pulseGlowGold { animation: pulseGlowGold 2s ease-in-out infinite; }
    .animate-spinSlow { animation: spinSlow 1.2s linear infinite; }
    .animate-spinReverse { animation: spinReverse 1.5s linear infinite; }
    .animate-float { animation: float 3.5s ease-in-out infinite; }
    .animate-floatRotate { animation: floatRotate 4s ease-in-out infinite; }
    .animate-heartbeat { animation: heartbeat 2s ease-in-out infinite; }
    .animate-calendarPop { animation: calendarPop 0.3s ease-out; }
    .animate-gradientShift { animation: gradientShift 4s ease infinite; background-size: 200% 200%; }

    .shimmer {
      background: linear-gradient(90deg, var(--shimmer-1) 25%, var(--shimmer-2) 50%, var(--shimmer-1) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.8s ease-in-out infinite;
    }

    /* ═══ STAGGERED ANIMATIONS ═══ */
    .stagger-1 { animation-delay: 0.05s; }
    .stagger-2 { animation-delay: 0.1s; }
    .stagger-3 { animation-delay: 0.15s; }
    .stagger-4 { animation-delay: 0.2s; }
    .stagger-5 { animation-delay: 0.25s; }
    .stagger-6 { animation-delay: 0.3s; }

    /* ═══ GLASS MORPHISM ═══ */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-primary);
    }

    .glass-strong {
      background: var(--glass-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    /* ═══ SCROLLBAR ═══ */
    .scrollbar-thin::-webkit-scrollbar { width: 5px; height: 5px; }
    .scrollbar-thin::-webkit-scrollbar-track {
      background: var(--scrollbar-track);
      border-radius: 10px;
    }
    .scrollbar-thin::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb);
      border-radius: 10px;
      transition: background 0.2s;
    }
    .scrollbar-thin::-webkit-scrollbar-thumb:hover {
      background: var(--scrollbar-hover);
    }
    .scrollbar-none::-webkit-scrollbar { display: none; }
    .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }

    /* ═══ THEMED COMPONENT CLASSES ═══ */
    .themed-card {
      background-color: var(--bg-card);
      border: 1px solid var(--border-primary);
      box-shadow: var(--shadow-sm);
      color: var(--text-primary);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .themed-card:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--border-secondary);
    }

    .themed-input {
      background-color: var(--bg-input);
      border: 1.5px solid var(--border-input);
      color: var(--text-primary);
      transition: all 0.25s ease;
      border-radius: 12px;
    }
    .themed-input:focus {
      outline: none;
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.1);
    }
    .themed-input::placeholder {
      color: var(--text-tertiary);
    }

    .themed-sidebar {
      background: var(--gradient-sidebar);
      border-color: var(--border-primary);
    }

    .themed-header {
      background-color: var(--bg-header);
      border-color: var(--border-primary);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .themed-text { color: var(--text-primary); }
    .themed-text-secondary { color: var(--text-secondary); }
    .themed-text-tertiary { color: var(--text-tertiary); }
    .themed-text-accent { color: var(--text-accent); }
    .themed-border { border-color: var(--border-primary); }
    .themed-bg { background-color: var(--bg-primary); }
    .themed-bg-secondary { background-color: var(--bg-secondary); }
    .themed-bg-tertiary { background-color: var(--bg-tertiary); }

    /* ═══ DARK MODE TOGGLE SWITCH ═══ */
    .theme-switch {
      position: relative;
      width: 54px;
      height: 28px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      border: 2px solid transparent;
      overflow: hidden;
    }
    .theme-switch::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 12px;
      opacity: 0.15;
      transition: opacity 0.3s;
    }
    .theme-switch:hover::before { opacity: 0.25; }

    .theme-switch-light {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      border-color: rgba(245, 158, 11, 0.3);
    }
    .theme-switch-dark {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      border-color: rgba(124, 58, 237, 0.3);
    }

    .theme-switch-knob {
      position: absolute;
      top: 2px;
      width: 22px;
      height: 22px;
      border-radius: 11px;
      background: white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      transition: all 0.4s cubic-bezier(0.68, -0.3, 0.265, 1.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
    }
    .theme-switch-knob-light { left: 2px; }
    .theme-switch-knob-dark { left: 26px; }

    /* ═══ BUTTON STYLES ═══ */
    .btn-primary {
      background: var(--gradient-primary);
      color: white;
      padding: 10px 20px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 14px;
      border: none;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 12px rgba(236, 72, 153, 0.25);
      position: relative;
      overflow: hidden;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(236, 72, 153, 0.35);
    }
    .btn-primary:active {
      transform: translateY(0) scale(0.98);
    }
    .btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .btn-primary:hover::after { opacity: 1; }

    .btn-secondary {
      background-color: var(--bg-tertiary);
      color: var(--text-secondary);
      padding: 10px 20px;
      border-radius: 12px;
      font-weight: 500;
      font-size: 14px;
      border: 1.5px solid var(--border-secondary);
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .btn-secondary:hover {
      background-color: var(--bg-hover);
      border-color: var(--border-focus);
      color: var(--text-accent);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      padding: 8px 16px;
      border-radius: 10px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-ghost:hover {
      background-color: var(--bg-hover);
      color: var(--text-accent);
    }

    /* ═══ CARD HOVER EFFECTS ═══ */
    .card-hover {
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card-hover:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .pos-item {
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .pos-item:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
      border-color: var(--border-focus) !important;
    }
    .pos-item:active {
      transform: translateY(0) scale(0.97);
    }

    .stat-card {
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--gradient-primary);
      opacity: 0.04;
      transform: translate(20px, -20px);
      transition: all 0.4s ease;
    }
    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-lg);
    }
    .stat-card:hover::before {
      opacity: 0.08;
      transform: translate(10px, -10px) scale(1.2);
    }

    /* ═══ CALENDAR STYLES ═══ */
    .calendar-day {
      transition: all 0.2s ease;
      cursor: pointer;
      border-radius: 10px;
      position: relative;
    }
    .calendar-day:hover {
      background-color: rgba(236, 72, 153, 0.08);
    }
    .calendar-day-active {
      background: var(--gradient-primary) !important;
      color: white !important;
      border-radius: 10px;
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(236, 72, 153, 0.3);
    }
    .calendar-day-today {
      border: 2px solid #ec4899;
      border-radius: 10px;
    }
    .calendar-day-has-events::after {
      content: '';
      position: absolute;
      bottom: 3px;
      left: 50%;
      transform: translateX(-50%);
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #ec4899;
    }
    .calendar-day-active.calendar-day-has-events::after {
      background: white;
    }

    /* ═══ TIME SLOT STYLES ═══ */
    .time-slot {
      transition: all 0.2s ease;
      cursor: pointer;
      border: 2px solid var(--border-input);
      border-radius: 10px;
      text-align: center;
      padding: 8px;
    }
    .time-slot:hover:not(.time-slot-booked) {
      border-color: #ec4899;
      background-color: rgba(236, 72, 153, 0.05);
      transform: scale(1.02);
    }
    .time-slot-booked {
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 4px,

// ═══════════════════════════════════════════════════════════════
// ✨ LUMINA SALON & SPA - PART 3
// React Core: Contexts, DB Layer, Constants, Utilities
// ═══════════════════════════════════════════════════════════════

const { useState, useEffect, useCallback, useRef, useMemo, createContext, useContext, useReducer, memo } = React;

// ═══════════════════════════════════════════════════════
// 🌙 DARK MODE THEME CONTEXT
// ═══════════════════════════════════════════════════════
const ThemeContext = createContext();

function ThemeProvider({ children }) {
  const [isDark, setIsDark] = useState(() => {
    try { return localStorage.getItem('lumina_theme') === 'dark'; }
    catch(e) { return false; }
  });

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
    document.querySelector('meta[name="theme-color"]')?.setAttribute('content', isDark ? '#0c0a1a' : '#ec4899');
    try { localStorage.setItem('lumina_theme', isDark ? 'dark' : 'light'); } catch(e) {}
  }, [isDark]);

  const toggleTheme = useCallback(() => setIsDark(p => !p), []);

  return (
    <ThemeContext.Provider value={{ isDark, toggleTheme }}>
      {children}
    </ThemeContext.Provider>
  );
}

const useTheme = () => useContext(ThemeContext);

// ═══════════════════════════════════════════════════════
// 🌙 DARK MODE TOGGLE BUTTON
// ═══════════════════════════════════════════════════════
function ThemeToggle({ compact = false }) {
  const { isDark, toggleTheme } = useTheme();

  if (compact) {
    return (
      <button onClick={toggleTheme}
        className="w-9 h-9 rounded-xl flex items-center justify-center transition-all duration-300 hover:scale-110 active:scale-95"
        style={{ backgroundColor: 'var(--bg-tertiary)' }}
        title={isDark ? 'Light Mode' : 'Dark Mode'}>
        <span className="text-base">{isDark ? '☀️' : '🌙'}</span>
      </button>
    );
  }

  return (
    <button onClick={toggleTheme}
      className={`theme-switch ${isDark ? 'theme-switch-dark' : 'theme-switch-light'}`}
      title={isDark ? 'Light Mode එකට මාරු වන්න' : 'Dark Mode එකට මාරු වන්න'}>
      <div className={`theme-switch-knob ${isDark ? 'theme-switch-knob-dark' : 'theme-switch-knob-light'}`}>
        {isDark ? '🌙' : '☀️'}
      </div>
    </button>
  );
}

// ═══════════════════════════════════════════════════════
// 🔔 TOAST NOTIFICATION SYSTEM
// ═══════════════════════════════════════════════════════
const ToastContext = createContext();

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const toastId = useRef(0);

  const addToast = useCallback((message, type = 'info', duration = 3500) => {
    const id = ++toastId.current;
    setToasts(prev => [...prev.slice(-4), { id, message, type, duration, entering: true }]);
    setTimeout(() => {
      setToasts(prev => prev.map(t => t.id === id ? { ...t, exiting: true } : t));
      setTimeout(() => {
        setToasts(prev => prev.filter(t => t.id !== id));
      }, 300);
    }, duration);
  }, []);

  const removeToast = useCallback((id) => {
    setToasts(prev => prev.map(t => t.id === id ? { ...t, exiting: true } : t));
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 300);
  }, []);

  const toastConfig = {
    success: { icon: 'fa-check-circle', bg: 'bg-emerald-50', border: 'border-emerald-200', text: 'text-emerald-800', iconColor: 'text-emerald-500' },
    error: { icon: 'fa-exclamation-circle', bg: 'bg-red-50', border: 'border-red-200', text: 'text-red-800', iconColor: 'text-red-500' },
    warning: { icon: 'fa-exclamation-triangle', bg: 'bg-amber-50', border: 'border-amber-200', text: 'text-amber-800', iconColor: 'text-amber-500' },
    info: { icon: 'fa-info-circle', bg: 'bg-blue-50', border: 'border-blue-200', text: 'text-blue-800', iconColor: 'text-blue-500' }
  };

  return (
    <ToastContext.Provider value={{ addToast }}>
      {children}
      <div className="fixed top-4 right-4 z-[9999] flex flex-col gap-2.5 max-w-sm pointer-events-none">
        {toasts.map(t => {
          const cfg = toastConfig[t.type] || toastConfig.info;
          return (
            <div key={t.id}
              className={`pointer-events-auto rounded-2xl px-4 py-3 shadow-lg flex items-center gap-3 cursor-pointer border-l-4
                ${cfg.bg} ${cfg.border} ${cfg.text}
                ${t.exiting ? 'animate-slideInRight' : 'animate-slideInRight'}
                ${t.exiting ? 'opacity-0 translate-x-full' : 'opacity-100'}`}
              style={{
                transition: t.exiting ? 'all 0.3s ease-in' : 'none',
                transform: t.exiting ? 'translateX(120%)' : 'translateX(0)'
              }}
              onClick={() => removeToast(t.id)}>
              <div className={`w-8 h-8 rounded-full ${cfg.bg} flex items-center justify-center flex-shrink-0`}>
                <i className={`fas ${cfg.icon} ${cfg.iconColor} text-sm`}></i>
              </div>
              <span className="text-sm font-medium flex-1 leading-snug">{t.message}</span>
              <button className="opacity-40 hover:opacity-100 transition-opacity flex-shrink-0 ml-1" onClick={(e) => { e.stopPropagation(); removeToast(t.id); }}>
                <i className="fas fa-times text-xs"></i>
              </button>
            </div>
          );
        })}
      </div>
    </ToastContext.Provider>
  );
}

const useToast = () => useContext(ToastContext);

  // ── GAS API call ──
  async callGAS(fn, payload) {
    if (!this._isGAS) throw new Error('GAS not available');
    return new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(r => {
          const parsed = typeof r === 'string' ? JSON.parse(r) : r;
          if (parsed.success) resolve(parsed);
          else reject(new Error(parsed.error || 'Unknown error'));
        })
        .withFailureHandler(e => reject(e))
        .doPost({ action: fn, ...payload });
    });
  },

  // ── ID Generator ──
  genId(prefix) {
    const ts = Date.now().toString(36).toUpperCase();
    const rnd = Math.random().toString(36).substring(2, 6).toUpperCase();
    return `${prefix}${ts}${rnd}`;
  },

  // ════════════════════════════
  // PRODUCTS
  // ════════════════════════════
  async getProducts() {
    try {
      if (this._isGAS) { const r = await this.callGAS('getProducts', {}); this._lsSet('products', r.data); return r.data; }
    } catch(e) { console.log('Products: Fallback to localStorage'); }
    return this._ls('products');
  },

  async saveProduct(product) {
    const products = this._ls('products');
    if (product.id) {
      const idx = products.findIndex(p => p.id === product.id);
      if (idx >= 0) products[idx] = { ...products[idx], ...product };
    } else {
      product.id = this.genId('P');
      products.push(product);
    }
    this._lsSet('products', products);
    try { if (this._isGAS) await this.callGAS('saveProduct', { product }); } catch(e) {}
    return product;
  },

  async deleteProduct(id) {
    this._lsSet('products', this._ls('products').filter(p => p.id !== id));
    try { if (this._isGAS) await this.callGAS('deleteProduct', { id }); } catch(e) {}
    return true;
  },

  // ════════════════════════════
  // TRANSACTIONS
  // ════════════════════════════
  async getTransactions() {
    try {
      if (this._isGAS) { const r = await this.callGAS('getTransactions', {}); this._lsSet('transactions', r.data); return r.data; }
    } catch(e) {}
    return this._ls('transactions');
  },

  async saveTransaction(txn) {
    txn.id = txn.id || this.genId('TXN');
    txn.date = txn.date || new Date().toISOString();
    txn.receiptNo = txn.receiptNo || 'R' + Date.now().toString().slice(-8);

    const txns = this._ls('transactions');
    txns.unshift(txn);
    this._lsSet('transactions', txns);

    // Stock sync
    const products = this._ls('products');
    if (txn.items) {
      txn.items.forEach(item => {
        const pIdx = products.findIndex(p => p.id === item.productId);
        if (pIdx >= 0) {
          products[pIdx].stock = Math.max(0, (products[pIdx].stock || 0) - item.qty);
          if (products[pIdx].stock <= products[pIdx].minStock && products[pIdx].minStock > 0) {
            const alerts = this._ls('alerts');
            alerts.unshift({
              id: this.genId('A'), type: 'low_stock',
              message: `⚠️ ${products[pIdx].name} තොග අඩුයි (${products[pIdx].stock})`,
              date: new Date().toISOString(), read: false, productId: products[pIdx].id
            });
            this._lsSet('alerts', alerts);
          }
        }
      });
      this._lsSet('products', products);
    }

    // Auto-create warranty
    if (txn.items) {
      const warranties = this._ls('warranties');
      txn.items.forEach(item => {
        const prod = products.find(p => p.id === item.productId);
        if (prod && prod.warranty > 0) {
          const start = new Date(), end = new Date();
          end.setMonth(end.getMonth() + prod.warranty);
          warranties.unshift({
            id: this.genId('W'), txnId: txn.id, productId: item.productId,
            productName: prod.name, customerName: txn.customerName || '',
            customerPhone: txn.customerPhone || '', startDate: start.toISOString(),
            endDate: end.toISOString(), months: prod.warranty, status: 'active'
          });
        }
      });
      this._lsSet('warranties', warranties);
    }

    // Update staff sales
    if (txn.staffId) {
      const staff = this._ls('staff');
      const sIdx = staff.findIndex(s => s.id === txn.staffId);
      if (sIdx >= 0) {
        staff[sIdx].totalSales = (staff[sIdx].totalSales || 0) + (parseFloat(txn.total) || 0);
        this._lsSet('staff', staff);
      }
    }

    try { if (this._isGAS) await this.callGAS('saveTransaction', { transaction: txn }); } catch(e) {}
    return txn;
  },

    this._lsSet('warranties', warranties);
    try { if (this._isGAS) await this.callGAS('updateWarranty', { id, updates }); } catch(e) {}
    return warranties[idx];
  },

  // ════════════════════════════
  // RETURNS
  // ════════════════════════════
  async getReturns() {
    try { if (this._isGAS) { const r = await this.callGAS('getReturns', {}); this._lsSet('returns', r.data); return r.data; } }
    catch(e) {}
    return this._ls('returns');
  },

  async saveReturn(ret) {
    ret.id = ret.id || this.genId('RET');
    ret.date = ret.date || new Date().toISOString();
    const returns = this._ls('returns');
    returns.unshift(ret);
    this._lsSet('returns', returns);
    if (ret.productId && ret.qty) {
      const products = this._ls('products');
      const pIdx = products.findIndex(p => p.id === ret.productId);
      if (pIdx >= 0) { products[pIdx].stock = (products[pIdx].stock || 0) + ret.qty; this._lsSet('products', products); }
    }
    try { if (this._isGAS) await this.callGAS('saveReturn', { returnData: ret }); } catch(e) {}
    return ret;
  },

  // ════════════════════════════
  // ALERTS
  // ════════════════════════════
  async getAlerts() {
    try { if (this._isGAS) { const r = await this.callGAS('getAlerts', {}); this._lsSet('alerts', r.data); return r.data; } }
    catch(e) {}
    return this._ls('alerts');
  },

  async markAlertRead(id) {
    const alerts = this._ls('alerts');
    const idx = alerts.findIndex(a => a.id === id);
    if (idx >= 0) alerts[idx].read = true;
    this._lsSet('alerts', alerts);
    return true;
  },

  async markAllAlertsRead() {
    const alerts = this._ls('alerts');
    alerts.forEach(a => a.read = true);
    this._lsSet('alerts', alerts);
    return true;
  },

  // ════════════════════════════
  // RESTOCKS
  // ════════════════════════════
  async getRestocks() {
    try { if (this._isGAS) { const r = await this.callGAS('getRestocks', {}); this._lsSet('restocks', r.data); return r.data; } }
    catch(e) {}
    return this._ls('restocks');
  },

  async saveRestock(restock) {
    restock.id = restock.id || this.genId('RS');
    restock.orderDate = restock.orderDate || new Date().toISOString();
    const restocks = this._ls('restocks');
    if (restock._update) {
      const idx = restocks.findIndex(r => r.id === restock.id);
      if (idx >= 0) {
        restocks[idx] = { ...restocks[idx], ...restock };
        if (restock.status === 'received') {
          const products = this._ls('products');
          const pIdx = products.findIndex(p => p.id === restock.productId);
          if (pIdx >= 0) { products[pIdx].stock = (products[pIdx].stock || 0) + parseInt(restock.qty || 0); this._lsSet('products', products); }
        }
      }
    } else { restocks.unshift(restock); }
    this._lsSet('restocks', restocks);
    try { if (this._isGAS) await this.callGAS('saveRestock', { restock }); } catch(e) {}
    return restock;
  },

  // ════════════════════════════
  // STAFF
  // ════════════════════════════
  async getStaff() {
    try { if (this._isGAS) { const r = await this.callGAS('getStaff', {}); this._lsSet('staff', r.data); return r.data; } }
    catch(e) {}
    return this._ls('staff');
  },

  async saveStaff(member) {
    const staff = this._ls('staff');
    if (member.id) {
      const idx = staff.findIndex(s => s.id === member.id);
      if (idx >= 0) staff[idx] = { ...staff[idx], ...member };
    } else {
      member.id = this.genId('STF');
      member.joinDate = member.joinDate || new Date().toISOString().split('T')[0];
      member.totalSales = 0;
      member.status = member.status || 'active';
      staff.push(member);
    }
    this._lsSet('staff', staff);
    try { if (this._isGAS) await this.callGAS('saveStaff', { staff: member }); } catch(e) {}
    return member;
  },

  async deleteStaff(id) {
    this._lsSet('staff', this._ls('staff').filter(s => s.id !== id));
    try { if (this._isGAS) await this.callGAS('deleteStaff', { id }); } catch(e) {}
    return true;
  },

  async getStaffPerformance(staffId) {
    const txns = this._ls('transactions');
    const appts = this._ls('appointments');
    const sTxns = txns.filter(t => t.staffId === staffId);
    const sAppts = appts.filter(a => a.staffId === staffId);
    const totalRev = sTxns.reduce((s, t) => s + (parseFloat(t.total) || 0), 0);
    const mTxns = sTxns.filter(t => new Date(t.date) >= new Date(Date.now() - 30 * 24 * 60 * 60 * 1000));
    const mRev = mTxns.reduce((s, t) => s + (parseFloat(t.total) || 0), 0);
    return {
      totalTransactions: sTxns.length, totalRevenue: totalRev,
      monthTransactions: mTxns.length, monthRevenue: mRev,
      totalAppointments: sAppts.length,
      completedAppointments: sAppts.filter(a => a.status === 'completed').length
    };
  },

  // ════════════════════════════
  // APPOINTMENTS
  // ════════════════════════════
  async getAppointments() {
    try { if (this._isGAS) { const r = await this.callGAS('getAppointments', {}); this._lsSet('appointments', r.data); return r.data; } }
    catch(e) {}
    return this._ls('appointments');
  },

  async saveAppointment(appt) {
    const appointments = this._ls('appointments');
    if (appt.id && appt._update) {
      const idx = appointments.findIndex(a => a.id === appt.id);
      if (idx >= 0) appointments[idx] = { ...appointments[idx], ...appt };
    } else {
      appt.id = appt.id || this.genId('APT');
      appt.createdAt = appt.createdAt || new Date().toISOString();
      appt.status = appt.status || 'pending';
      appointments.unshift(appt);
    }
    this._lsSet('appointments', appointments);
    try { if (this._isGAS) await this.callGAS('saveAppointment', { appointment: appt }); } catch(e) {}
    return appt;
  },

  async updateAppointmentStatus(id, status) {
    const appointments = this._ls('appointments');
    const idx = appointments.findIndex(a => a.id === id);
    if (idx >= 0) {
      appointments[idx].status = status;
      if (status === 'completed') appointments[idx].completedAt = new Date().toISOString();
      if (status === 'cancelled') appointments[idx].cancelledAt = new Date().toISOString();
    }
    this._lsSet('appointments', appointments);
    try { if (this._isGAS) await this.callGAS('updateAppointment', { id, status }); } catch(e) {}
    return appointments[idx];
  },

  async deleteAppointment(id) {
    this._lsSet('appointments', this._ls('appointments').filter(a => a.id !== id));
    return true;
  },

  getBookedSlots(date, staffId) {
    const appointments = this._ls('appointments');
    return appointments
      .filter(a => a.date === date && a.staffId === staffId && a.status !== 'cancelled')
      .map(a => {
        const startMins = parseInt(a.time.split(':')[0]) * 60 + parseInt(a.time.split(':')[1]);
        const slots = [];
        for (let m = startMins; m < startMins + (a.duration || 30); m += 30) {
          slots.push(`${Math.floor(m / 60).toString().padStart(2, '0')}:${(m % 60).toString().padStart(2, '0')}`);
        }
        return slots;
      }).flat();
  },

  // ── Settings ──
  getSettings() { return this._lsObj('settings'); },
  saveSettings(s) { this._lsObjSet('settings', s); }
};

const formatCurrency = (n) => {
  const num = parseFloat(n) || 0;
  return `Rs. ${num.toLocaleString('en-LK', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
};

const formatCurrencyShort = (n) => {
  const num = parseFloat(n) || 0;
  if (num >= 1000000) return `Rs. ${(num / 1000000).toFixed(1)}M`;
  if (num >= 1000) return `Rs. ${(num / 1000).toFixed(1)}K`;
  return `Rs. ${num.toFixed(0)}`;
};

const formatDate = (d) => {
  if (!d) return '-';
  return new Date(d).toLocaleDateString('si-LK', { year: 'numeric', month: 'short', day: 'numeric' });
};

const formatDateTime = (d) => {
  if (!d) return '-';
  return new Date(d).toLocaleDateString('si-LK', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
};

const formatDateShort = (d) => {
  if (!d) return '-';
  return new Date(d).toLocaleDateString('si-LK', { month: 'short', day: 'numeric' });
};

const getRelativeTime = (d) => {
  if (!d) return '';
  const diff = Date.now() - new Date(d).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'දැන්';
  if (mins < 60) return `මිනිත්තු ${mins}ට පෙර`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `පැය ${hrs}ට පෙර`;
  const days = Math.floor(hrs / 24);
  if (days < 7) return `දින ${days}ට පෙර`;
  if (days < 30) return `සති ${Math.floor(days / 7)}ට පෙර`;
  return formatDate(d);
};

const sendWhatsApp = (phone, message) => {
  let num = phone.replace(/[^0-9]/g, '');
  if (num.startsWith('0')) num = '94' + num.substring(1);
  if (!num.startsWith('94')) num = '94' + num;
  window.open(`https://wa.me/${num}?text=${encodeURIComponent(message)}`, '_blank');
};

  t += `📍 කොළඹ, ශ්‍රී ලංකාව\n📞 011-2345678\n`;

  t += `📅 දිනය: ${formatDateTime(txn.date)}\n`;
  if (txn.customerName) t += `👤 පාරිභෝගිකයා: ${txn.customerName}\n`;

    t += `උප එකතුව: ${formatCurrency(txn.subtotal)}\n`;
    t += `🏷️ වට්ටම: -${formatCurrency(txn.discount)}\n`;
  }
  t += `💰 *මුළු එකතුව: ${formatCurrency(txn.total)}*\n`;
  t += `💳 ගෙවීම: ${PAY_METHODS.find(p => p.id === txn.payMethod)?.label || txn.payMethod}\n`;

  t += `💕 *Lumina Salon & Spa*\n`;
  t += `🌐 Follow us on Instagram`;
  return t;
};

// Confetti effect for celebrations
const fireConfetti = () => {
  const colors = ['#ec4899', '#f472b6', '#fbbf24', '#a855f7', '#22c55e', '#06b6d4'];
  for (let i = 0; i < 30; i++) {
    const particle = document.createElement('div');
    particle.className = 'confetti-particle';
    particle.style.left = Math.random() * 100 + 'vw';
    particle.style.top = '-10px';
    particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

    cyan: 'bg-cyan-100 text-cyan-700'
  };
  const sizeMap = { xs: 'text-[10px] px-1.5 py-0.5', sm: 'text-xs px-2 py-0.5', md: 'text-xs px-2.5 py-1' };

  return (
    <span className={`inline-flex items-center gap-1 rounded-full font-medium
      ${colorMap[color] || colorMap.pink} ${sizeMap[size] || sizeMap.sm}
      ${pulse ? 'badge-pulse' : ''}`}>
      {icon && <i className={`fas ${icon} text-[10px]`}></i>}
      {children}
    </span>
  );
}

// 📊 DASHBOARD TAB
// ═══════════════════════════════════════════════════════
function DashboardTab() {
  const { addToast } = useToast();
  const { isDark } = useTheme();
  const [stats, setStats] = useState({ todaySales: 0, todayTxns: 0, totalProducts: 0, lowStock: 0, monthSales: 0, weekSales: 0, todayAppts: 0 });
  const [recentTxns, setRecentTxns] = useState([]);
  const [topProducts, setTopProducts] = useState([]);
  const [staffPerf, setStaffPerf] = useState([]);
  const [todayAppts, setTodayAppts] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => { loadDashboard(); }, []);

  const loadDashboard = async () => {
    setLoading(true);
    try {
      const [products, transactions, staff, appointments] = await Promise.all([
        DB.getProducts(), DB.getTransactions(), DB.getStaff(), DB.getAppointments()
      ]);

      const today = new Date().toDateString();
      const todayStr = new Date().toISOString().split('T')[0];
      const weekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
      const monthAgo = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000);

      const todayTxns = transactions.filter(t => new Date(t.date).toDateString() === today);
      const weekTxns = transactions.filter(t => new Date(t.date) >= weekAgo);
      const monthTxns = transactions.filter(t => new Date(t.date) >= monthAgo);

      const todaySales = todayTxns.reduce((s, t) => s + (parseFloat(t.total) || 0), 0);
      const weekSales = weekTxns.reduce((s, t) => s + (parseFloat(t.total) || 0), 0);
      const monthSales = monthTxns.reduce((s, t) => s + (parseFloat(t.total) || 0), 0);
      const lowStock = products.filter(p => p.stock <= p.minStock && p.minStock > 0).length;

      const todayAppointments = appointments.filter(a => a.date === todayStr && a.status !== 'cancelled');

      // Top products
      const productCounts = {};
      transactions.forEach(t => {
        if (t.items) t.items.forEach(item => {
          productCounts[item.productId] = (productCounts[item.productId] || 0) + (item.qty || 1);
        });
      });
      const topProds = Object.entries(productCounts)
        .sort((a, b) => b[1] - a[1]).slice(0, 5)
        .map(([id, count]) => {
          const prod = products.find(p => p.id === id);
          return prod ? { ...prod, soldCount: count } : null;
        }).filter(Boolean);

      // Staff performance
      const staffWithPerf = staff.filter(s => s.status === 'active').map(s => ({
        ...s,
        monthTxns: transactions.filter(t => t.staffId === s.id && new Date(t.date) >= monthAgo).length,
        monthRevenue: transactions.filter(t => t.staffId === s.id && new Date(t.date) >= monthAgo)
          .reduce((sum, t) => sum + (parseFloat(t.total) || 0), 0)
      })).sort((a, b) => b.monthRevenue - a.monthRevenue);

      setStats({ todaySales, todayTxns: todayTxns.length, totalProducts: products.length, lowStock, monthSales, weekSales, todayAppts: todayAppointments.length });
      setRecentTxns(transactions.slice(0, 8));
      setTopProducts(topProds);
      setStaffPerf(staffWithPerf.slice(0, 5));
      setTodayAppts(todayAppointments.slice(0, 5));
    } catch (e) {
      addToast('දත්ත පූරණයේ දෝෂයක්', 'error');
    }
    setLoading(false);
  };

  if (loading) return <Skeleton type="cards" />;

  // Weekly chart data
  const chartDays = Array(7).fill(0).map((_, i) => {
    const d = new Date(Date.now() - (6 - i) * 24 * 60 * 60 * 1000);
    const dayTxns = recentTxns.filter(t => new Date(t.date).toDateString() === d.toDateString());
    const dayTotal = dayTxns.reduce((s, t) => s + (parseFloat(t.total) || 0), 0);
    return { date: d, label: d.toLocaleDateString('si-LK', { weekday: 'short' }), total: dayTotal };
  });
  const maxDayTotal = Math.max(...chartDays.map(d => d.total), 1);

  return (
    <div className="space-y-5 sm:space-y-6 page-enter">

      {/* ── Welcome Banner ── */}
      <div className="relative rounded-2xl sm:rounded-3xl overflow-hidden shadow-lg">
        <div className="absolute inset-0 animate-gradientShift"
          style={{ background: 'linear-gradient(135deg, #ec4899, #a855f7, #f59e0b, #ec4899)', backgroundSize: '300% 300%' }}></div>
        <div className="absolute inset-0 bg-black/10"></div>
        {/* Floating emojis */}
        <div className="absolute inset-0 overflow-hidden pointer-events-none">
          {['🌸', '✨', '💎', '🦋'].map((e, i) => (
            <span key={i} className="absolute text-xl sm:text-2xl opacity-20 animate-float"
              style={{ right: `${5 + i * 15}%`, top: `${10 + i * 20}%`, animationDelay: `${i * 0.5}s` }}>{e}</span>
          ))}
        </div>
        <div className="relative p-5 sm:p-7">
          <div className="flex items-center justify-between">
            <div>
              <h2 className="text-2xl sm:text-3xl font-extrabold text-white mb-1">ආයුබෝවන්! 🙏</h2>
              <p className="text-white/80 text-sm sm:text-base">Lumina Salon & Spa කළමනාකරණ පද්ධතියට සාදරයෙන් පිළිගනිමු</p>
              <p className="text-white/50 text-xs sm:text-sm mt-1.5 flex items-center gap-2">
                <i className="fas fa-calendar-day"></i>
                {new Date().toLocaleDateString('si-LK', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
              </p>
            </div>
            <div className="text-5xl sm:text-7xl opacity-80 animate-floatRotate hidden sm:block">✨</div>
          </div>
          {/* Quick stats in banner */}
          <div className="flex gap-3 sm:gap-4 mt-4 flex-wrap">
            {[
              { label: 'අද විකුණුම්', value: formatCurrencyShort(stats.todaySales), icon: '💰' },
              { label: 'ගනුදෙනු', value: stats.todayTxns, icon: '🧾' },
              { label: 'වේලාවන්', value: stats.todayAppts, icon: '📅' }
            ].map((q, i) => (
              <div key={i} className="bg-white/15 backdrop-blur-sm rounded-xl px-3 sm:px-4 py-2 sm:py-2.5 flex items-center gap-2">
                <span className="text-lg">{q.icon}</span>
                <div>
                  <div className="text-white text-sm sm:text-base font-bold">{q.value}</div>
                  <div className="text-white/60 text-[10px] sm:text-xs">{q.label}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* ── Stat Cards ── */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4">
        <StatCard label="අද විකුණුම්" value={formatCurrency(stats.todaySales)} icon="fa-coins"
          gradient="from-pink-500 to-rose-500" sub={`ගනුදෙනු ${stats.todayTxns}ක්`} delay={0} />
        <StatCard label="සති විකුණුම්" value={formatCurrency(stats.weekSales)} icon="fa-chart-line"
          gradient="from-violet-500 to-purple-500" sub="පසුගිය දින 7" delay={50} />
        <StatCard label="මාසික විකුණුම්" value={formatCurrency(stats.monthSales)} icon="fa-calendar-days"
          gradient="from-emerald-500 to-green-500" sub="පසුගිය දින 30" delay={100} />
        <StatCard label="නිෂ්පාදන" value={stats.totalProducts} icon="fa-boxes-stacked"
          gradient="from-amber-500 to-orange-500" delay={150}
          sub={stats.lowStock > 0 ? `⚠️ තොග අඩු ${stats.lowStock}` : '✅ තොග හොඳයි'} />
      </div>

      {/* ── Charts + Appointments Row ── */}
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 sm:gap-5">

        {/* Weekly Chart */}
        <div className="lg:col-span-2 themed-card rounded-2xl p-4 sm:p-5 border">
          <h3 className="font-bold mb-4 flex items-center gap-2" style={{ color: 'var(--text-primary)' }}>
            <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-violet-500 to-purple-500 flex items-center justify-center">
              <i className="fas fa-chart-bar text-white text-xs"></i>
            </div>
            සතිපතා විකුණුම් ප්‍රවණතාව
          </h3>
          <div className="flex items-end gap-1.5 sm:gap-2" style={{ height: '160px' }}>
            {chartDays.map((day, i) => {
              const pct = Math.max(5, (day.total / maxDayTotal) * 100);
              const isToday = i === 6;
              return (
                <div key={i} className="flex-1 flex flex-col items-center gap-1">
                  <span className="text-[9px] sm:text-[10px] font-medium" style={{ color: 'var(--text-tertiary)' }}>
                    {day.total > 0 ? formatCurrencyShort(day.total).replace('Rs. ', '') : ''}

                  <div className="w-full rounded-t-lg relative" style={{ height: '120px', backgroundColor: 'var(--bg-tertiary)' }}>

                      style={{ height: `${pct}%`, animationDelay: `${i * 80}ms` }}>

        <div className="themed-card rounded-2xl p-4 sm:p-5 border">

      {/* ── Top Products + Staff Performance ── */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 sm:gap-5">

        {/* Top Products */}
        <div className="themed-card rounded-2xl p-4 sm:p-5 border">
          <h3 className="font-bold mb-4 flex items-center gap-2" style={{ color: 'var(--text-primary)' }}>
            <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-amber-500 to-orange-500 flex items-center justify-center">
              <i className="fas fa-trophy text-white text-xs"></i>
            </div>
            ජනප්‍රිය නිෂ්පාදන

          <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-500 to-teal-500 flex items-center justify-center">

                    <td className="py-2.5 text-right font-bold" style={{ color: 'var(--text-primary)' }}>
                      {formatCurrency(txn.total)}

            </table>

        )}
      </div>
    </div>
  );
}

  const loadProducts = async () => {
    setLoading(true);
    const data = await DB.getProducts();
    setProducts(data);
    setLoading(false);
  };

  const filtered = useMemo(() => {
    return products.filter(p => {
      const matchSearch = !search ||
        p.name.toLowerCase().includes(search.toLowerCase()) ||
        (p.nameEn && p.nameEn.toLowerCase().includes(search.toLowerCase())) ||
        p.id.toLowerCase().includes(search.toLowerCase()) ||
        (p.barcode && p.barcode.includes(search));
      const matchCat = catFilter === 'සියලුම' || p.category === catFilter;
      return matchSearch && matchCat;
    });
  }, [products, search, catFilter]);

  const openForm = (product = null) => {
    if (product) {
      setFormData({
        name: product.name, nameEn: product.nameEn || '', category: product.category,
        price: String(product.price), cost: String(product.cost), stock: String(product.stock),
        minStock: String(product.minStock), barcode: product.barcode || '',
        warranty: String(product.warranty || 0), image: product.image || '📦'
      });
      setEditProduct(product);
    } else {
      setFormData({
        name: '', nameEn: '', category: 'හිසකෙස් නිෂ්පාදන', price: '', cost: '',
        stock: '', minStock: '', barcode: '', warranty: '0', image: '📦'
      });
      setEditProduct(null);
    }
    setShowForm(true);
  };

  const handleSave = async () => {
    if (!formData.name || !formData.price) {
      addToast('නම සහ මිල අවශ්‍යයි', 'warning');
      return;
    }
    try {
      const product = {
        ...formData,
        id: editProduct ? editProduct.id : undefined,
        price: parseFloat(formData.price) || 0,
        cost: parseFloat(formData.cost) || 0,
        stock: parseInt(formData.stock) || 0,
        minStock: parseInt(formData.minStock) || 0,
        warranty: parseInt(formData.warranty) || 0
      };
      await DB.saveProduct(product);
      addToast(editProduct ? 'නිෂ්පාදනය යාවත්කාලීන කරන ලදී ✅' : 'නිෂ්පාදනය එකතු කරන ලදී ✨', 'success');
      setShowForm(false);
      loadProducts();
    } catch (e) {
      addToast('දෝෂයක් ඇති විය', 'error');
    }
  };

  const handleDelete = async (id) => {
    if (!confirm('මෙම නිෂ්පාදනය මකන්නද?')) return;
    await DB.deleteProduct(id);
    addToast('නිෂ්පාදනය මකා දමන ලදී 🗑️', 'success');
    loadProducts();
  };

  const totalValue = products.reduce((s, p) => s + (p.price * p.stock), 0);
  const totalItems = products.reduce((s, p) => s + p.stock, 0);

  if (loading) return <Skeleton rows={5} />;

  return (
    <div className="space-y-4 sm:space-y-5 page-enter">

      {/* ── Header Bar ── */}
      <div className="flex flex-col sm:flex-row gap-3 items-start sm:items-center justify-between">
        <div className="flex-1 w-full sm:w-auto">
          <SearchInput value={search} onChange={setSearch} placeholder="නිෂ්පාදන සොයන්න..." className="w-full sm:max-w-xs" />
        </div>
        <div className="flex gap-2 flex-wrap items-center">
          <select value={catFilter} onChange={e => setCatFilter(e.target.value)}
            className="px-3 py-2.5 rounded-xl text-sm themed-input">
            {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
          <div className="flex rounded-xl p-1" style={{ backgroundColor: 'var(--bg-tertiary)' }}>
            <button onClick={() => setViewMode('grid')}
              className={`px-3 py-1.5 rounded-lg text-sm transition-all ${viewMode === 'grid' ? 'bg-white shadow-sm text-pink-600' : ''}`}
              style={viewMode !== 'grid' ? { color: 'var(--text-tertiary)' } : {}}>
              <i className="fas fa-th-large"></i>
            </button>
            <button onClick={() => setViewMode('list')}
              className={`px-3 py-1.5 rounded-lg text-sm transition-all ${viewMode === 'list' ? 'bg-white shadow-sm text-pink-600' : ''}`}
              style={viewMode !== 'list' ? { color: 'var(--text-tertiary)' } : {}}>
              <i className="fas fa-list"></i>
            </button>
          </div>
          <button onClick={() => openForm()} className="btn-primary text-sm px-4 py-2.5 flex items-center gap-2">
            <i className="fas fa-plus"></i>
            <span className="hidden sm:inline">නව නිෂ්පාදනයක්</span>
            <span className="sm:hidden">එකතු</span>
          </button>
        </div>
      </div>

      {/* ── Quick Stats ── */}
      <div className="grid grid-cols-3 gap-3">
        <div className="themed-card rounded-xl p-3 border text-center">
          <div className="text-lg font-bold" style={{ color: 'var(--text-primary)' }}>{filtered.length}</div>
          <div className="text-[11px]" style={{ color: 'var(--text-tertiary)' }}>නිෂ්පාදන</div>
        </div>
        <div className="themed-card rounded-xl p-3 border text-center">
          <div className="text-lg font-bold" style={{ color: 'var(--text-primary)' }}>{totalItems.toLocaleString()}</div>
          <div className="text-[11px]" style={{ color: 'var(--text-tertiary)' }}>මුළු තොග</div>
        </div>
        <div className="themed-card rounded-xl p-3 border text-center">
          <div className="text-lg font-bold text-pink-500">{formatCurrencyShort(totalValue)}</div>
          <div className="text-[11px]" style={{ color: 'var(--text-tertiary)' }}>තොග වටිනාකම</div>
        </div>
      </div>

      {/* ── Products Grid ── */}
      {viewMode === 'grid' ? (
        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3 sm:gap-4">
          {filtered.map((p, i) => (
            <div key={p.id} className="themed-card rounded-2xl border overflow-hidden group card-hover animate-slideInUp"
              style={{ animationDelay: `${Math.min(i * 30, 300)}ms` }}>

              {/* Product image area */}
              <div className="relative p-4 sm:p-5 text-center"
                style={{ background: `linear-gradient(135deg, var(--bg-tertiary), var(--bg-secondary))` }}>
                <span className="text-4xl sm:text-5xl">{p.image || '📦'}</span>

                {/* Badges */}
                {p.stock <= p.minStock && p.minStock > 0 && (
                  <span className="absolute top-2 right-2 bg-red-500 text-white text-[9px] px-1.5 py-0.5 rounded-full font-bold animate-pulse">
                    <i className="fas fa-exclamation mr-0.5"></i>තොග අඩු
                  </span>
                )}
                {p.warranty > 0 && (
                  <span className="absolute top-2 left-2 bg-blue-500 text-white text-[9px] px-1.5 py-0.5 rounded-full font-medium">
                    <i className="fas fa-shield-halved mr-0.5"></i>{p.warranty}මාස
                  </span>
                )}

                {/* Hover overlay */}
                <div className="absolute inset-0 flex items-center justify-center gap-2 opacity-0 group-hover:opacity-100 transition-all duration-300"
                  style={{ backgroundColor: 'rgba(0,0,0,0.1)' }}>
                  <button onClick={() => openForm(p)}
                    className="w-9 h-9 rounded-full bg-white shadow-lg flex items-center justify-center hover:scale-110 transition-all">
                    <i className="fas fa-edit text-pink-500 text-sm"></i>
                  </button>
                  <button onClick={() => handleDelete(p.id)}
                    className="w-9 h-9 rounded-full bg-white shadow-lg flex items-center justify-center hover:scale-110 transition-all">
                    <i className="fas fa-trash text-red-400 text-sm"></i>
                  </button>
                </div>
              </div>

              {/* Product info */}
              <div className="p-3 sm:p-4">
                <div className="text-[10px] font-medium text-pink-500 mb-0.5">{p.category}</div>
                <h4 className="font-semibold text-sm mb-0.5 truncate" style={{ color: 'var(--text-primary)' }}>{p.name}</h4>
                {p.nameEn && <p className="text-[11px] truncate mb-2" style={{ color: 'var(--text-tertiary)' }}>{p.nameEn}</p>}

                <div className="flex items-center justify-between mt-2">
                  <span className="text-base sm:text-lg font-extrabold text-pink-600">{formatCurrencyShort(p.price)}</span>
                  <Badge color={p.stock <= p.minStock && p.minStock > 0 ? 'red' : p.stock <= p.minStock * 2 ? 'yellow' : 'green'} size="xs">
                    තොග: {p.stock}
                  </Badge>
                </div>

                <div className="text-[10px] mt-1.5 flex justify-between" style={{ color: 'var(--text-tertiary)' }}>
                  <span>පිරිවැය: {formatCurrencyShort(p.cost)}</span>
                  <span className="text-emerald-500 font-medium">ලාභය: {formatCurrencyShort(p.price - p.cost)}</span>
                </div>
              </div>
            </div>
          ))}
        </div>
      ) : (
        /* ── List View ── */
        <div className="themed-card rounded-2xl border overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="border-b" style={{ backgroundColor: 'var(--bg-tertiary)', borderColor: 'var(--border-primary)' }}>
                  <th className="p-3 text-left text-xs font-medium" style={{ color: 'var(--text-tertiary)' }}>නිෂ්පාදනය</th>
                  <th className="p-3 text-left text-xs font-medium hidden sm:table-cell" style={{ color: 'var(--text-tertiary)' }}>වර්ගය</th>
                  <th className="p-3 text-right text-xs font-medium" style={{ color: 'var(--text-tertiary)' }}>මිල</th>
                  <th className="p-3 text-right text-xs font-medium hidden md:table-cell" style={{ color: 'var(--text-tertiary)' }}>පිරිවැය</th>
                  <th className="p-3 text-center text-xs font-medium" style={{ color: 'var(--text-tertiary)' }}>තොග</th>
                  <th className="p-3 text-center text-xs font-medium" style={{ color: 'var(--text-tertiary)' }}>ක්‍රියා</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map((p, i) => (
                  <tr key={p.id} className="border-b transition-all hover:opacity-80 animate-slideInUp"
                    style={{ borderColor: 'var(--border-primary)', animationDelay: `${Math.min(i * 20, 200)}ms` }}>
                    <td className="p-3">
                      <div className="flex items-center gap-2.5">
                        <span className="text-2xl">{p.image}</span>
                        <div className="min-w-0">
                          <div className="font-medium truncate" style={{ color: 'var(--text-primary)' }}>{p.name}</div>
                          <div className="text-[11px]" style={{ color: 'var(--text-tertiary)' }}>{p.id}</div>
                        </div>
                      </div>
                    </td>
                    <td className="p-3 hidden sm:table-cell">
                      <Badge color="purple" size="xs">{p.category}</Badge>
                    </td>
                    <td className="p-3 text-right font-bold text-pink-600">{formatCurrency(p.price)}</td>
                    <td className="p-3 text-right hidden md:table-cell" style={{ color: 'var(--text-secondary)' }}>{formatCurrency(p.cost)}</td>
                    <td className="p-3 text-center">
                      <Badge color={p.stock <= p.minStock && p.minStock > 0 ? 'red' : 'green'} size="xs">{p.stock}</Badge>
                    </td>
                    <td className="p-3 text-center">
                      <div className="flex items-center justify-center gap-1">
                        <button onClick={() => openForm(p)} className="w-7 h-7 rounded-lg flex items-center justify-center transition-all hover:bg-blue-50 hover:text-blue-500"
                          style={{ color: 'var(--text-tertiary)' }}>
                          <i className="fas fa-edit text-xs"></i>
                        </button>
                        <button onClick={() => handleDelete(p.id)} className="w-7 h-7 rounded-lg flex items-center justify-center transition-all hover:bg-red-50 hover:text-red-500"
                          style={{ color: 'var(--text-tertiary)' }}>
                          <i className="fas fa-trash text-xs"></i>
                        </button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {filtered.length === 0 && (
        <EmptyState icon="fa-box-open" title="නිෂ්පාදන හමු නොවීය"
          subtitle="සෙවුම් පෙරහන වෙනස් කරන්න හෝ නව නිෂ්පාදනයක් එකතු කරන්න"
          action={() => openForm()} actionLabel="නව නිෂ්පාදනයක් එකතු කරන්න" />
      )}

      {/* ── Product Form Modal ── */}
      <Modal isOpen={showForm} onClose={() => setShowForm(false)}
        title={editProduct ? '✏️ නිෂ්පාදනය සංස්කරණය' : '✨ නව නිෂ්පාදනයක්'} size="lg">
        <div className="space-y-4">

          {/* Emoji Picker */}
          <div>
            <label className="block text-sm font-medium mb-2" style={{ color: 'var(--text-secondary)' }}>
              <i className="fas fa-face-smile mr-1"></i> නිරූපකය තෝරන්න
            </label>
            <div className="flex flex-wrap gap-1.5">
              {PRODUCT_EMOJIS.map(e => (
                <button key={e} type="button" onClick={() => setFormData(f => ({ ...f, image: e }))}
                  className={`w-9 h-9 sm:w-10 sm:h-10 rounded-xl text-lg sm:text-xl flex items-center justify-center transition-all
                    ${formData.image === e ? 'bg-pink-100 ring-2 ring-pink-400 scale-110 shadow-md' : 'hover:bg-pink-50 hover:scale-105'}`}
                  style={formData.image !== e ? { backgroundColor: 'var(--bg-tertiary)' } : {}}>
                  {e}
                </button>
              ))}
            </div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label className="block text-sm font-medium mb-1" style={{ color: 'var(--text-secondary)' }}>
                නිෂ්පාදන නම (සිංහල) <span className="text-red-400">*</span>
              </label>
              <input type="text" value={formData.name} onChange={e => setFormData(f => ({ ...f, name: e.target.value }))}
                className="w-full px-3 py-2.5 rounded-xl text-sm themed-input" placeholder="උදා: කෙරටින් ට්‍රීට්මන්ට්" />
            </div>
            <div>
              <label className="block text-sm font-medium mb-1" style={{ color: 'var(--text-secondary)' }}>
                නිෂ්පාදන නම (English)
              </label>
              <input type="text" value={formData.nameEn} onChange={e => setFormData(f => ({ ...f, nameEn: e.target.value }))}
                className="w-full px-3 py-2.5 rounded-xl text-sm themed-input" placeholder="e.g. Keratin Treatment" />
            </div>
            <div>
              <label className="block text-sm font-medium mb-1" style={{ color: 'var(--text-secondary)' }}>
                වර්ගය <span className="text-red-400">*</span>
              </label>
              <select value={formData.category} onChange={e => setFormData(f => ({ ...f, category: e.target.value }))}
                className="w-full px-3 py-2.5 rounded-xl text-sm themed-input">
                {CATEGORIES.filter(c => c !== 'සියලුම').map(c => <option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <div>
              <label className="block text-sm font-medium mb-1" style={{ color: 'var(--text-secondary)' }}>
                බාර්කෝඩ්
              </label>
              <input type="text" value={formData.barcode} onChange={e => setFormData(f => ({ ...f, barcode: e.target.value }))}
                className="w-full px-3 py-2.5 rounded-xl text-sm themed-input" placeholder="Scan or type" />
            </div>
            <div>
              <label className="block text-sm font-medium mb-1" style={{ color: 'var(--text-secondary)' }}>
                විකුණුම් මිල (Rs.) <span className="text-red-400">*</span>
              </label>
              <input type="number" value={formData.price} onChange={e => setFormData(f => ({ ...f, price: e.target.value }))}
                className="w-full px-3 py-2.5 rounded-xl text-sm themed-input" min="0" step="0.01" />
            </div>
            <div>
              <label className="block text-sm font-medium mb-1" style={{ color: 'var(--text-secondary)' }}>
                පිරිවැය (Rs.)
              </label>
              <input type="number" value={formData.cost} onChange={e => setFormData(f => ({ ...f, cost: e.target.value }))}
                className="w-full px-3 py-2.5 rounded-xl text-sm themed-input" min="0" step="0.01" />
            </div>
            <div>
              <label className="block text-sm font-medium mb-1" style={{ color: 'var(--text-secondary)' }}>
                තොග ප්‍රමාණය
              </label>
              <input type="number" value={formData.stock} onChange={e => setFormData(f => ({ ...f, stock: e.target.value }))}
                className="w-full px-3 py-2.5 rounded-xl text-sm themed-input" min="0" />
            </div>
            <div>
              <label className="block text-sm font-medium mb-1" style={{ color: 'var(--text-secondary)' }}>
                අවම තොග
              </label>
              <input type="number" value={formData.minStock} onChange={e => setFormData(f => ({ ...f, minStock: e.target.value }))}
                className="w-full px-3 py-2.5 rounded-xl text-sm themed-input" min="0" />
            </div>
            <div>
              <label className="block text-sm font-medium mb-1" style={{ color: 'var(--text-secondary)' }}>
                වගකීම් කාලය (මාස)
              </label>
              <input type="number" value={formData.warranty} onChange={e => setFormData(f => ({ ...f, warranty: e.target.value }))}
                className="w-full px-3 py-2.5 rounded-xl text-sm themed-input" min="0" />
            </div>
          </div>

          {/* Profit Preview */}
          {formData.price && formData.cost && parseFloat(formData.price) > 0 && (
            <div className="rounded-xl p-3.5 border flex items-center gap-3 animate-fadeIn"
              style={{ backgroundColor: 'rgba(16, 185, 129, 0.05)', borderColor: 'rgba(16, 185, 129, 0.2)' }}>
              <div className="w-10 h-10 rounded-lg bg-emerald-100 flex items-center justify-center">
                <i className="fas fa-chart-line text-emerald-500"></i>
              </div>
              <div>
                <span className="text-sm font-medium text-emerald-700">
                  ලාභය: <strong>{formatCurrency(parseFloat(formData.price) - parseFloat(formData.cost))}</strong>
                </span>
                <span className="text-xs text-emerald-500 ml-2">
                  ({((1 - parseFloat(formData.cost) / parseFloat(formData.price)) * 100).toFixed(1)}% margin)
                </span>
              </div>
            </div>
          )}

          {/* Action Buttons */}
          <div className="flex gap-3 pt-2">
            <button onClick={handleSave} className="flex-1 btn-primary py-3 text-sm">
              <i className="fas fa-save mr-2"></i>
              {editProduct ? 'යාවත්කාලීන කරන්න' : 'එකතු කරන්න'}
            </button>
            <button onClick={() => setShowForm(false)} className="btn-secondary px-6 py-3 text-sm">
              අවලංගු
            </button>
          </div>
        </div>
      </Modal>
    </div>
  );
}
